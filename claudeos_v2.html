
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
#os{width:100%;height:600px;position:relative;overflow:hidden;background:#1a2744;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;}
#wallpaper{position:absolute;inset:0;background:
  radial-gradient(ellipse 60% 50% at 20% 80%, #0e3460 0%, transparent 60%),
  radial-gradient(ellipse 50% 60% at 80% 20%, #1e1060 0%, transparent 55%),
  radial-gradient(ellipse 40% 40% at 60% 70%, #0a2040 0%, transparent 50%),
  linear-gradient(135deg, #0d1f3c 0%, #1a1035 40%, #0f2545 70%, #071520 100%);}
#menubar{position:absolute;top:0;left:0;right:0;height:26px;background:rgba(12,14,20,0.78);backdrop-filter:blur(24px) saturate(180%);display:flex;align-items:center;padding:0 14px;gap:0;z-index:900;border-bottom:0.5px solid rgba(255,255,255,0.1);}
.mb-apple{width:20px;height:20px;margin-right:8px;cursor:pointer;flex-shrink:0;}
.mb-appname{font-size:13px;font-weight:600;color:rgba(255,255,255,0.92);margin-right:4px;cursor:default;}
.mb-menu{font-size:13px;color:rgba(255,255,255,0.78);padding:3px 8px;border-radius:4px;cursor:pointer;}
.mb-menu:hover{background:rgba(255,255,255,0.14);}
#mb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.mb-r-icon{width:16px;height:16px;cursor:pointer;opacity:0.82;}
#mb-clock{font-size:12px;color:rgba(255,255,255,0.88);font-weight:500;letter-spacing:0.2px;}

.win{position:absolute;border-radius:12px;overflow:hidden;border:0.5px solid rgba(255,255,255,0.14);box-shadow:0 24px 60px rgba(0,0,0,0.65),0 2px 8px rgba(0,0,0,0.4);min-width:220px;min-height:120px;}
.win-bar{height:38px;display:flex;align-items:center;padding:0 14px;gap:8px;cursor:move;position:relative;flex-shrink:0;background:rgba(36,36,48,0.92);}
.win-bar-sep{border-bottom:0.5px solid rgba(255,255,255,0.07);}
.tb-btn{width:13px;height:13px;border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .1s;}
.tb-btn:hover{opacity:.8;}
.tb-close{background:#ff5f57;border:0.5px solid rgba(0,0,0,0.18);}
.tb-min{background:#febc2e;border:0.5px solid rgba(0,0,0,0.18);}
.tb-max{background:#28c840;border:0.5px solid rgba(0,0,0,0.18);}
.tb-title{position:absolute;left:50%;transform:translateX(-50%);font-size:13px;color:rgba(255,255,255,0.72);font-weight:500;pointer-events:none;white-space:nowrap;}
.win-content{overflow:hidden;background:rgba(22,22,30,0.96);}

#dock{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.1);backdrop-filter:blur(24px) saturate(180%);border:0.5px solid rgba(255,255,255,0.18);border-radius:20px;padding:7px 12px;display:flex;align-items:flex-end;gap:8px;z-index:900;}
.dk{width:52px;height:52px;border-radius:13px;cursor:pointer;position:relative;transition:transform .15s ease;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dk:hover{transform:translateY(-12px) scale(1.18);}
.dk.open::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.6);}
.dk-sep{width:0.5px;height:38px;background:rgba(255,255,255,0.22);margin:0 2px;align-self:center;}

.desk-icon{position:absolute;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:8px;border-radius:8px;width:76px;}
.desk-icon:hover{background:rgba(255,255,255,0.1);}
.desk-icon .label{font-size:12px;color:rgba(255,255,255,0.9);text-align:center;text-shadow:0 1px 6px rgba(0,0,0,0.9);}

.finder-layout{display:flex;height:100%;}
.finder-sb{width:150px;background:rgba(18,18,26,0.7);border-right:0.5px solid rgba(255,255,255,0.07);padding:10px 0;flex-shrink:0;}
.sb-sec{font-size:11px;color:rgba(255,255,255,0.35);padding:8px 14px 4px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;}
.sb-row{display:flex;align-items:center;gap:8px;padding:5px 14px;font-size:13px;color:rgba(255,255,255,0.68);cursor:pointer;border-radius:0;}
.sb-row:hover{background:rgba(255,255,255,0.07);}
.sb-row.sel{background:rgba(80,120,255,0.22);color:rgba(255,255,255,0.92);}
.finder-main{flex:1;padding:12px;overflow:auto;}
.f-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:10px;}
.f-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:8px;cursor:pointer;}
.f-item:hover{background:rgba(255,255,255,0.08);}
.f-item .lbl{font-size:11px;color:rgba(255,255,255,0.72);text-align:center;line-height:1.3;}

.term-wrap{background:#0d0f14;height:100%;padding:14px;font-family:'SF Mono','Menlo',monospace;font-size:12.5px;display:flex;flex-direction:column;}
.term-out{flex:1;overflow:auto;margin-bottom:8px;}
.t-line{margin:2px 0;line-height:1.5;}
.t-green{color:#57e87a;}
.t-blue{color:#79b8ff;}
.t-red{color:#f97583;}
.t-dim{color:#6a737d;}
.t-white{color:#e1e4e8;}
.term-row{display:flex;align-items:center;gap:6px;}
.term-ps{color:#57e87a;white-space:nowrap;font-size:12.5px;}
.term-inp{background:transparent;border:none;outline:none;color:#e1e4e8;font-family:inherit;font-size:12.5px;flex:1;caret-color:#e1e4e8;}
-webkit-user-select:text;user-select:text;

.notes-wrap{display:flex;height:100%;}
.notes-sb{width:180px;background:#f7f5ed;border-right:1px solid #e0ddd4;padding:8px 0;flex-shrink:0;overflow:auto;}
.notes-item{padding:8px 14px;cursor:pointer;border-bottom:0.5px solid rgba(0,0,0,0.06);}
.notes-item:hover{background:#edeae0;}
.notes-item.sel{background:#e3dfc8;}
.notes-item .n-title{font-size:13px;font-weight:500;color:#2c2b26;}
.notes-item .n-date{font-size:11px;color:#8a8778;margin-top:2px;}
.notes-item .n-preview{font-size:11px;color:#6b6a60;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.notes-body{flex:1;background:#fdfae8;padding:20px;display:flex;flex-direction:column;}
.notes-body textarea{flex:1;background:transparent;border:none;outline:none;font-family:Georgia,serif;font-size:14.5px;color:#2c2b26;resize:none;line-height:1.9;-webkit-user-select:text;user-select:text;}

.sys-wrap{display:flex;height:100%;}
.sys-sb{width:190px;background:rgba(18,18,26,0.7);border-right:0.5px solid rgba(255,255,255,0.07);padding:8px;overflow:auto;flex-shrink:0;}
.sys-search{width:100%;background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;color:rgba(255,255,255,0.8);font-size:13px;padding:6px 10px;outline:none;margin-bottom:10px;-webkit-user-select:text;user-select:text;}
.sys-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;}
.sys-item:hover{background:rgba(255,255,255,0.07);}
.sys-item.sel{background:rgba(80,110,255,0.2);}
.sys-icon-wrap{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sys-item-label{font-size:13px;color:rgba(255,255,255,0.78);}
.sys-main{flex:1;padding:20px;overflow:auto;}
.sys-heading{font-size:18px;font-weight:500;color:rgba(255,255,255,0.9);margin-bottom:18px;}
.pref-card{background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.pref-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid rgba(255,255,255,0.05);}
.pref-row:last-child{border-bottom:none;}
.pref-left .p-label{font-size:13px;color:rgba(255,255,255,0.85);}
.pref-left .p-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;}
.tog{width:42px;height:24px;border-radius:12px;background:#30d158;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:white;transition:left .2s;}
.tog.off{background:rgba(255,255,255,0.2);}
.tog.off::after{left:20px;}

.notif{position:absolute;top:34px;right:12px;background:rgba(32,32,44,0.96);backdrop-filter:blur(20px);border:0.5px solid rgba(255,255,255,0.14);border-radius:14px;padding:13px 15px;width:270px;z-index:9000;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.notif-enter{animation:nfade .2s ease;}
@keyframes nfade{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.notif-app{font-size:11px;color:rgba(255,255,255,0.38);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.notif-title{font-size:13px;color:rgba(255,255,255,0.9);font-weight:500;}
.notif-msg{font-size:12px;color:rgba(255,255,255,0.5);margin-top:3px;line-height:1.4;}
</style>

<script>
const os=document.getElementById('os');
let zTop=10,wins={};
const wCfg={
  finder:{title:'Finder',w:560,h:360,x:60,y:44},
  notes:{title:'Notes',w:480,h:340,x:120,y:54},
  terminal:{title:'Terminal',w:500,h:300,x:80,y:64},
  settings:{title:'System Settings',w:540,h:380,x:100,y:44}
};

function tick(){
  const n=new Date();let h=n.getHours(),m=n.getMinutes();
  const ap=h>=12?'PM':'AM';h=h%12||12;
  document.getElementById('mb-clock').textContent=`${h}:${String(m).padStart(2,'0')} ${ap}`;
}
tick();setInterval(tick,15000);

function finderSVG(icon){
  const icons={
    folder:`<svg width="30" height="30" viewBox="0 0 30 30"><path d="M3 8h10l2 3h12v14H3V8z" fill="#4a9eff"/><path d="M3 11h24v14H3V11z" fill="#5aafff"/></svg>`,
    pdf:`<svg width="30" height="30" viewBox="0 0 30 30"><rect x="5" y="2" width="20" height="26" rx="3" fill="#ff453a"/><text x="15" y="19" text-anchor="middle" font-size="9" font-weight="bold" fill="white" font-family="Helvetica">PDF</text></svg>`,
    img:`<svg width="30" height="30" viewBox="0 0 30 30"><rect x="4" y="4" width="22" height="22" rx="4" fill="#30a96e"/><circle cx="11" cy="11" r="3" fill="rgba(255,255,255,0.6)"/><path d="M4 20l7-8 6 7 3-4 6 5v4H4z" fill="rgba(255,255,255,0.85)"/></svg>`,
    doc:`<svg width="30" height="30" viewBox="0 0 30 30"><rect x="5" y="2" width="20" height="26" rx="3" fill="#3478f6"/><line x1="9" y1="10" x2="21" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="14" x2="21" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="18" x2="16" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>`,
    zip:`<svg width="30" height="30" viewBox="0 0 30 30"><rect x="5" y="2" width="20" height="26" rx="3" fill="#8e44ad"/><text x="15" y="19" text-anchor="middle" font-size="9" font-weight="bold" fill="white" font-family="Helvetica">ZIP</text></svg>`,
    code:`<svg width="30" height="30" viewBox="0 0 30 30"><rect x="5" y="2" width="20" height="26" rx="3" fill="#1c1c1e"/><text x="15" y="19" text-anchor="middle" font-size="8" font-weight="bold" fill="#30d158" font-family="Menlo,monospace">&lt;/&gt;</text></svg>`,
  };
  return icons[icon]||icons.doc;
}

function makeFinderContent(){
  const files=[
    ['folder','Projects'],['folder','Archive'],['folder','Design'],
    ['pdf','Resume.pdf'],['doc','Report.docx'],['img','Screenshot'],
    ['zip','Backup.zip'],['code','index.js'],['img','Wallpapers'],
    ['doc','Notes.txt'],['code','style.css'],['folder','Downloads']
  ];
  return `<div class="finder-layout">
    <div class="finder-sb">
      <div class="sb-sec">Favourites</div>
      <div class="sb-row sel">${sbIcon('home')} Home</div>
      <div class="sb-row">${sbIcon('folder')} Documents</div>
      <div class="sb-row">${sbIcon('dl')} Downloads</div>
      <div class="sb-row">${sbIcon('img')} Pictures</div>
      <div class="sb-row">${sbIcon('music')} Music</div>
      <div class="sb-sec">Locations</div>
      <div class="sb-row">${sbIcon('hd')} Macintosh HD</div>
      <div class="sb-row">${sbIcon('cloud')} iCloud</div>
    </div>
    <div class="finder-main"><div class="f-grid">
      ${files.map(([t,n])=>`<div class="f-item">${finderSVG(t)}<div class="lbl">${n}</div></div>`).join('')}
    </div></div>
  </div>`;
}

function sbIcon(t){
  const s='width:14px;height:14px;flex-shrink:0;';
  const m={
    home:`<svg style="${s}" viewBox="0 0 14 14" fill="rgba(255,255,255,0.5)"><path d="M7 1L1 6v7h4V9h4v4h4V6L7 1z"/></svg>`,
    folder:`<svg style="${s}" viewBox="0 0 14 14" fill="rgba(255,255,255,0.5)"><path d="M1 4h5l1 1.5H13V12H1V4z"/></svg>`,
    dl:`<svg style="${s}" viewBox="0 0 14 14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"><path d="M7 2v7M4 6l3 3 3-3M2 11h10" stroke-linecap="round"/></svg>`,
    img:`<svg style="${s}" viewBox="0 0 14 14" fill="rgba(255,255,255,0.5)"><rect x="1" y="2" width="12" height="10" rx="2"/><circle cx="5" cy="6" r="1.5" fill="rgba(30,30,40,0.6)"/><path d="M1 10l4-4 3 3 2-2 3 3v1H1z" fill="rgba(30,30,40,0.4)"/></svg>`,
    music:`<svg style="${s}" viewBox="0 0 14 14" fill="rgba(255,255,255,0.5)"><path d="M5 11V3l7-1.5V9M5 11a2 2 0 11-4 0 2 2 0 014 0zM12 9a2 2 0 11-4 0 2 2 0 014 0z"/></svg>`,
    hd:`<svg style="${s}" viewBox="0 0 14 14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.3"><rect x="1" y="3" width="12" height="8" rx="2"/><circle cx="10.5" cy="7" r="1.2" fill="rgba(255,255,255,0.5)" stroke="none"/></svg>`,
    cloud:`<svg style="${s}" viewBox="0 0 14 14" fill="rgba(255,255,255,0.5)"><path d="M11 10H3a3 3 0 010-6 3 3 0 015.8-1A3 3 0 0111 10z"/></svg>`,
  };
  return m[t]||m.folder;
}

function makeTerminalContent(){
  return `<div class="term-wrap" id="tw">
    <div class="term-out" id="to">
      <div class="t-line t-dim">Last login: ${new Date().toDateString()} on ttys000</div>
      <div class="t-line t-dim" style="margin-bottom:8px;">Type <span class="t-blue">help</span> for available commands</div>
    </div>
    <div class="term-row">
      <span class="term-ps">guest@ClaudeOS ~ %</span>
      <input class="term-inp" id="ti" onkeydown="termKey(event)" autocomplete="off" spellcheck="false">
    </div>
  </div>`;
}

function makeNotesContent(){
  const entries=[
    {title:'Welcome',date:'Today, 10:24 AM',preview:'Welcome to ClaudeOS!',body:`Welcome to ClaudeOS!\n\nThis is your Notes app. You can click different notes in the sidebar, and type freely in this area.\n\nTry opening the Terminal — type 'help' to see what commands are available.`},
    {title:'Ideas',date:'Yesterday',preview:'Things to build next...',body:`Things to build next:\n\n• Calculator app\n• Music player\n• Spotlight search\n• Calendar\n• Maps app\n\nThis is getting fun!`},
    {title:'Shopping list',date:'Mon, Apr 7',preview:'Milk, eggs, bread...',body:`Milk\nEggs\nBread\nOlive oil\nCoffee\nLemons\nPasta\nTomatoes`},
  ];
  let current=0;
  window._notesEntries=entries;window._notesCurrent=0;
  return `<div class="notes-wrap">
    <div class="notes-sb" id="notes-sb">
      ${entries.map((e,i)=>`<div class="notes-item${i===0?' sel':''}" onclick="selectNote(${i})">
        <div class="n-title">${e.title}</div>
        <div class="n-date">${e.date}</div>
        <div class="n-preview">${e.preview}</div>
      </div>`).join('')}
    </div>
    <div class="notes-body"><textarea id="notes-ta">${entries[0].body}</textarea></div>
  </div>`;
}

window.selectNote=function(i){
  window._notesCurrent=i;
  document.getElementById('notes-ta').value=window._notesEntries[i].body;
  document.querySelectorAll('.notes-item').forEach((el,j)=>el.classList.toggle('sel',j===i));
};

function makeSettingsContent(){
  const sections=[
    {label:'General',col:'#636366'},
    {label:'Appearance',col:'#8e44ad'},
    {label:'Display',col:'#1e7cf5'},
    {label:'Sound',col:'#ff9f0a'},
    {label:'Privacy',col:'#30d158'},
    {label:'Network',col:'#0a84ff'},
    {label:'Notifications',col:'#ff453a'},
  ];
  const prefs=[
    ['Dark Mode','Use dark interface throughout','on'],
    ['Wi-Fi','Connected to ClaudeNet 5G','on'],
    ['Notifications','Show banners and alerts','on'],
    ['Auto-update','Keep ClaudeOS up to date','on'],
    ['Location','Allow location services','off'],
    ['Analytics','Send crash reports','off'],
  ];
  return `<div class="sys-wrap">
    <div class="sys-sb">
      <input class="sys-search" placeholder="Search..." type="text">
      ${sections.map((s,i)=>`<div class="sys-item${i===0?' sel':''}" onclick="selectSysItem(this,'${s.label}')">
        <div class="sys-icon-wrap" style="background:${s.col}">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="white"><rect x="2" y="2" width="12" height="12" rx="3"/></svg>
        </div>
        <span class="sys-item-label">${s.label}</span>
      </div>`).join('')}
    </div>
    <div class="sys-main">
      <div class="sys-heading" id="sys-heading">General</div>
      <div class="pref-card">
        ${prefs.map(([l,s,v])=>`<div class="pref-row">
          <div class="pref-left"><div class="p-label">${l}</div><div class="p-sub">${s}</div></div>
          <div class="tog${v==='off'?' off':''}" onclick="this.classList.toggle('off')"></div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

window.selectSysItem=function(el,label){
  document.querySelectorAll('.sys-item').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  const h=document.getElementById('sys-heading');
  if(h)h.textContent=label;
};

const builders={finder:makeFinderContent,notes:makeNotesContent,terminal:makeTerminalContent,settings:makeSettingsContent};

function openApp(id){
  if(wins[id]){focusWin(id);return;}
  const c=wCfg[id];
  const w=document.createElement('div');
  w.className='win'; w.id='w-'+id;
  const ox=c.x+Math.random()*30|0, oy=c.y+Math.random()*20|0;
  w.style.cssText=`left:${ox}px;top:${oy}px;width:${c.w}px;height:${c.h}px;z-index:${++zTop};`;
  w.innerHTML=`<div class="win-bar win-bar-sep" onmousedown="startDrag(event,'${id}')">
    <div class="tb-btn tb-close" onclick="closeWin('${id}')"></div>
    <div class="tb-btn tb-min" onclick="minWin('${id}')"></div>
    <div class="tb-btn tb-max"></div>
    <span class="tb-title">${c.title}</span>
  </div>
  <div class="win-content" style="height:calc(100% - 38px);">${builders[id]()}</div>`;
  os.appendChild(w); wins[id]=w;
  document.getElementById('dk-'+id)&&document.getElementById('dk-'+id).classList.add('open');
  document.getElementById('mb-appname').textContent=c.title;
  if(id==='terminal')setTimeout(()=>{const i=document.getElementById('ti');if(i)i.focus();},50);
}

function focusWin(id){
  if(wins[id]){wins[id].style.zIndex=++zTop;document.getElementById('mb-appname').textContent=wCfg[id].title;}
}
function closeWin(id){
  if(wins[id]){os.removeChild(wins[id]);delete wins[id];}
  const dk=document.getElementById('dk-'+id);if(dk)dk.classList.remove('open');
}
function minWin(id){
  if(wins[id]){const d=wins[id].style.display;wins[id].style.display=d==='none'?'':'none';}
}

let drag=null;
function startDrag(e,id){
  focusWin(id);
  const w=wins[id],r=w.getBoundingClientRect(),or=os.getBoundingClientRect();
  drag={id,ox:e.clientX-(r.left-or.left),oy:e.clientY-(r.top-or.top)};
  e.preventDefault();
}
document.addEventListener('mousemove',e=>{
  if(!drag)return;
  const w=wins[drag.id],or=os.getBoundingClientRect();
  w.style.left=(e.clientX-or.left-drag.ox)+'px';
  w.style.top=Math.max(26,e.clientY-or.top-drag.oy)+'px';
});
document.addEventListener('mouseup',()=>{drag=null;});

const termCmds={
  help:()=>[`<span class="t-blue">Available commands:</span>`,`<span class="t-green">ls</span> &nbsp;<span class="t-green">pwd</span> &nbsp;<span class="t-green">whoami</span> &nbsp;<span class="t-green">date</span> &nbsp;<span class="t-green">echo</span> &lt;text&gt; &nbsp;<span class="t-green">clear</span> &nbsp;<span class="t-green">uname</span>`],
  ls:()=>[`<span class="t-blue">Documents</span> &nbsp;<span class="t-blue">Downloads</span> &nbsp;<span class="t-blue">Pictures</span> &nbsp;<span class="t-blue">Projects</span>`,`readme.txt &nbsp;notes.md &nbsp;.bash_profile`],
  pwd:()=>[`<span class="t-white">/Users/guest</span>`],
  whoami:()=>[`<span class="t-white">guest</span>`],
  uname:()=>[`<span class="t-white">ClaudeOS 1.0.0 Darwin Kernel Version 24.0</span>`],
  date:()=>[`<span class="t-white">${new Date().toString()}</span>`],
  clear:()=>{document.getElementById('to').innerHTML='';return[];},
};

window.termKey=function(e){
  if(e.key!=='Enter')return;
  const inp=document.getElementById('ti');
  const val=inp.value.trim();inp.value='';
  const out=document.getElementById('to');
  if(!out)return;
  out.innerHTML+=`<div class="t-line"><span class="t-green">guest@ClaudeOS</span><span class="t-dim"> ~ %</span> <span class="t-white">${val}</span></div>`;
  const[cmd,...args]=val.split(' ');
  if(cmd==='echo'){out.innerHTML+=`<div class="t-line t-white">${args.join(' ')}</div>`;}
  else if(termCmds[cmd]){const r=termCmds[cmd]();(r||[]).forEach(l=>{out.innerHTML+=`<div class="t-line">${l}</div>`;});}
  else if(val){out.innerHTML+=`<div class="t-line t-red">-bash: ${cmd}: command not found</div>`;}
  const tw=document.getElementById('tw');if(tw)tw.scrollTop=tw.scrollHeight;
};

let nTimer;
function showNotif(app,title,msg){
  document.querySelectorAll('.notif').forEach(n=>n.remove());
  const n=document.createElement('div');
  n.className='notif notif-enter';
  n.innerHTML=`<div class="notif-app">${app}</div><div class="notif-title">${title}</div><div class="notif-msg">${msg}</div>`;
  n.onclick=()=>n.remove();
  os.appendChild(n);
  clearTimeout(nTimer);nTimer=setTimeout(()=>n.remove(),3500);
}
window.showNotif=showNotif;
window.toggleNotif=function(){showNotif('Notification Centre','No new notifications','You\'re all caught up.');};

setTimeout(()=>showNotif('ClaudeOS','Welcome!','Double-click icons or use the dock.'),700);
openApp('finder');
</script>
