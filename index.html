<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NextOS - Secure Edition</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: url('https://cdn.discordapp.com/attachments/1490821953358135490/1493679242230104235/NextOS_wallpaper.png?ex=69dfd8b2&is=69de8732&hm=5e463232114b4fab3c4d65a07420822a271d5d3a5d1998f8472862886a915221&'); 
            --brightness: 1; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-user-select: none; user-select: none; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        
        #os { 
            width: 100%; height: 100%; position: relative; 
            background: #0d1f3c var(--bg) no-repeat center center; 
            background-size: cover; filter: brightness(var(--brightness));
            display: none; /* Hidden until unlocked */
        }

        /* LOCK SCREEN */
        #lock-screen {
            position: fixed; inset: 0; z-index: 20000;
            background: var(--bg) no-repeat center center; background-size: cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(20px); transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #lock-screen.unlocked { transform: translateY(-100%); }
        #lock-content { text-align: center; color: white; transition: 0.3s; }
        #lock-time { font-size: 80px; font-weight: 200; margin-bottom: 10px; }
        #lock-date { font-size: 20px; font-weight: 400; margin-bottom: 40px; opacity: 0.8; }
        #pass-box { background: rgba(255,255,255,0.2); border: none; padding: 10px 20px; border-radius: 20px; color: white; outline: none; text-align: center; backdrop-filter: blur(10px); width: 200px; font-size: 14px; }
        #pass-box::placeholder { color: rgba(255,255,255,0.6); }

        /* RE-INSTATING CORE UI */
        #menubar {
            position: absolute; top: 0; width: 100%; height: 28px;
            background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(30px);
            display: flex; align-items: center; padding: 0 15px; z-index: 10000;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1); color: white; font-size: 13px;
        }
        .m-item { margin-right: 15px; cursor: default; }
        .m-bold { font-weight: 700; margin-right: 20px; }

        .win {
            position: absolute; border-radius: 12px; overflow: hidden;
            background: rgba(30, 30, 35, 0.98); backdrop-filter: blur(50px);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); display: flex; flex-direction: column;
        }
        .win.fullscreen { width: 100vw !important; height: calc(100vh - 28px) !important; top: 28px !important; left: 0 !important; border-radius: 0; }
        .traffic-lights { display: flex; gap: 8px; margin-right: 15px; }
        .tb { width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer; }
        .tb-close { background: #ff5f57; } .tb-min { background: #febc2e; } .tb-max { background: #28c840; }

        #dock-container { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); padding: 8px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(30px); border-radius: 20px; z-index: 9999; }
        #dock { display: flex; gap: 12px; align-items: center; }
        .dk { width: 52px; height: 52px; border-radius: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>

<div id="lock-screen">
    <div id="lock-content">
        <div id="lock-time">--:--</div>
        <div id="lock-date">Wednesday, April 15</div>
        <input type="password" id="pass-box" placeholder="Enter Password" onkeydown="if(event.key==='Enter') unlock()">
    </div>
</div>

<div id="os">
    <div id="menubar">
        <i data-lucide="apple" style="width:14px; margin-right:15px;"></i>
        <span class="m-bold" id="active-app-name">Finder</span>
        <span class="m-item">File</span><span class="m-item">Edit</span><span class="m-item">View</span><span class="m-item">Go</span><span class="m-item">Window</span><span class="m-item">Help</span>
        <span id="clock" style="margin-left:auto; font-weight: 500;">--:--</span>
    </div>

    <div id="dock-container">
        <div id="dock">
            <div class="dk" title="Safari" onclick="openApp('browser')"><i data-lucide="globe"></i></div>
            <div class="dk" title="Calculator" onclick="openApp('calc')"><i data-lucide="calculator"></i></div>
            <div class="dk" title="Calendar" onclick="openApp('calendar')"><i data-lucide="calendar"></i></div>
            <div class="dk" title="Terminal" onclick="openApp('terminal')"><i data-lucide="terminal"></i></div>
            <div class="dk" title="Weather" onclick="openApp('weather')"><i data-lucide="cloud-sun"></i></div>
            <div class="dk" title="Settings" onclick="openApp('settings')"><i data-lucide="settings"></i></div>
        </div>
    </div>
</div>

<script>
    const os = document.getElementById('os');
    const lock = document.getElementById('lock-screen');
    let zIndex = 1000;
    const wins = {};

    function unlock() {
        // Just press enter to unlock for now
        lock.classList.add('unlocked');
        os.style.display = 'block';
        setTimeout(() => lock.style.display = 'none', 800);
    }

    function openApp(id) {
        if (wins[id]) return;
        const w = document.createElement('div');
        w.className = 'win'; w.id = 'win-' + id;
        w.style.width = '400px'; w.style.height = '300px';
        w.style.left = '100px'; w.style.top = '100px'; w.style.zIndex = ++zIndex;
        w.innerHTML = `
            <div style="height:38px; display:flex; align-items:center; padding:0 12px; background:rgba(255,255,255,0.05);">
                <div class="traffic-lights">
                    <button class="tb tb-close" onclick="closeApp('${id}')"></button>
                    <button class="tb tb-min"></button>
                    <button class="tb tb-max" onclick="this.closest('.win').classList.toggle('fullscreen')"></button>
                </div>
                <span style="margin:auto;font-size:12px;color:white;">${id.toUpperCase()}</span>
            </div>
            <div style="flex:1; background:#1c1c1e; padding:20px; color:white;" id="content-${id}"></div>`;
        os.appendChild(w); wins[id] = w;
        if(id === 'settings') {
            document.getElementById(`content-${id}`).innerHTML = `<h3>Brightness</h3><input type="range" min="0.3" max="1" step="0.01" oninput="document.documentElement.style.setProperty('--brightness', this.value)" style="width:100%;">`;
        }
    }

    function closeApp(id) { os.removeChild(wins[id]); delete wins[id]; }

    function updateTime() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        document.getElementById('clock').innerText = timeStr;
        document.getElementById('lock-time').innerText = timeStr;
    }

    setInterval(updateTime, 1000);
    updateTime();
    lucide.createIcons();
</script>
</body>
</html>
