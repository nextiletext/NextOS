<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextOS - Pro Max</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        #os { width: 100vw; height: 100vh; position: relative; transition: filter 0.1s linear; }
        #wallpaper { position: absolute; inset: 0; background: linear-gradient(135deg, #0d1f3c 0%, #1a1035 100%); z-index: 0; background-size: cover; background-position: center; }
        #brightness-overlay { position: absolute; inset: 0; background: black; opacity: 0; pointer-events: none; z-index: 20000; }

        /* Menubar */
        #menubar {
            position: absolute; top: 0; width: 100%; height: 30px;
            background: rgba(12, 14, 20, 0.6); backdrop-filter: blur(25px);
            display: flex; align-items: center; padding: 0 15px; z-index: 10000;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1); color: white; font-size: 13px;
        }

        /* Windows */
        .win {
            position: absolute; border-radius: 12px; overflow: hidden;
            background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column;
            will-change: transform; transform: translateZ(0); 
            transition: transform 0.4s cubic-bezier(0.2, 0, 0.2, 1), opacity 0.3s;
            transform-origin: bottom center;
        }
        .win.dragging { transition: none; } /* Kill transitions during drag for 0ms lag */
        .win.genie-hide { transform: scale(0) translateY(600px) translateZ(0); opacity: 0; pointer-events: none; }
        .win.fullscreen { width: 100vw !important; height: calc(100vh - 30px) !important; top: 30px !important; left: 0 !important; border-radius: 0; }

        .win-bar { height: 38px; display: flex; align-items: center; padding: 0 15px; gap: 8px; cursor: move; background: rgba(255, 255, 255, 0.05); }
        .tb { width: 12px; height: 12px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; color: transparent; cursor: pointer; }
        .win-bar:hover .tb { color: rgba(0,0,0,0.6); }
        .tb-close { background: #ff5f57; } .tb-min { background: #febc2e; } .tb-max { background: #28c840; }

        .win-content { flex: 1; overflow-y: auto; color: white; }

        /* Settings App UI */
        .settings-container { display: flex; height: 100%; }
        .settings-sidebar { width: 150px; background: rgba(255,255,255,0.05); padding: 15px; border-right: 0.5px solid rgba(255,255,255,0.1); }
        .settings-nav { padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 5px; }
        .settings-nav:hover, .settings-nav.active { background: rgba(255,255,255,0.1); }
        .settings-main { flex: 1; padding: 25px; }
        .setting-row { margin-bottom: 20px; }
        .setting-row label { display: block; font-size: 11px; opacity: 0.6; margin-bottom: 8px; }
        
        input[type="range"] { width: 100%; accent-color: #007aff; }
        .wallpaper-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .wp-option { height: 60px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; background-size: cover; }
        .wp-option:hover { border-color: #007aff; }

        /* Dock */
        #dock-container { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); padding: 8px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(30px); border-radius: 22px; border: 0.5px solid rgba(255,255,255,0.2); z-index: 9999; }
        #dock { display: flex; gap: 12px; }
        .dk { width: 52px; height: 52px; border-radius: 14px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); color: white; }
        .dk:hover { transform: scale(1.25) translateY(-8px); }
    </style>
</head>
<body>

<div id="os">
    <div id="wallpaper"></div>
    <div id="brightness-overlay"></div>
    
    <div id="menubar">
        <i data-lucide="apple" style="width:16px; margin-right:15px;"></i>
        <span id="active-app" style="font-weight:700; margin-right:15px;">Settings</span>
        <span id="clock" style="margin-left:auto;">--:--</span>
    </div>

    <div id="dock-container">
        <div id="dock">
            <div class="dk" onclick="openApp('finder')"><i data-lucide="folder"></i></div>
            <div class="dk" onclick="openApp('calc')"><i data-lucide="calculator"></i></div>
            <div class="dk" onclick="openApp('settings')"><i data-lucide="settings"></i></div>
        </div>
    </div>
</div>

<script>
    const os = document.getElementById('os');
    let zIndex = 1000;
    const wins = {};

    const apps = {
        finder: { title: 'Finder', w: 500, h: 350, html: `<div style="padding:20px;">Macintosh HD</div>` },
        calc: { title: 'Calculator', w: 260, h: 400, html: `<div style="padding:20px;">Calc Engine v2</div>` },
        settings: { title: 'Settings', w: 600, h: 450, html: `
            <div class="settings-container">
                <div class="settings-sidebar">
                    <div class="settings-nav active">Appearance</div>
                    <div class="settings-nav">Display</div>
                    <div class="settings-nav">About</div>
                </div>
                <div class="settings-main">
                    <div id="s-appearance">
                        <div class="setting-row">
                            <label>WALLPAPER</label>
                            <div class="wallpaper-grid">
                                <div class="wp-option" style="background: linear-gradient(135deg, #0d1f3c, #1a1035)" onclick="setWP(this.style.background)"></div>
                                <div class="wp-option" style="background: linear-gradient(135deg, #ff9a9e, #fad0c4)" onclick="setWP(this.style.background)"></div>
                                <div class="wp-option" style="background: linear-gradient(135deg, #a1c4fd, #c2e9fb)" onclick="setWP(this.style.background)"></div>
                                <div class="wp-option" style="background: #111" onclick="setWP(this.style.background)"></div>
                            </div>
                        </div>
                        <div class="setting-row">
                            <label>BRIGHTNESS</label>
                            <input type="range" min="0" max="0.8" step="0.01" value="0" oninput="setBrightness(this.value)">
                        </div>
                        <div class="setting-row" style="margin-top:40px; border-top:0.5px solid #333; padding-top:20px;">
                            <label>SYSTEM INFO</label>
                            <p style="font-size:13px;">NextOS Pro v3.5.0</p>
                            <p style="font-size:11px; opacity:0.5;">Processor: Virtual 8-Core AI</p>
                            <p style="font-size:11px; opacity:0.5;">Memory: 16GB Unified Storage</p>
                        </div>
                    </div>
                </div>
            </div>` }
    };

    function openApp(id) {
        if (wins[id]) { wins[id].classList.remove('genie-hide'); focusWin(id); return; }
        const config = apps[id];
        const w = document.createElement('div');
        w.className = 'win genie-hide'; w.id = 'win-' + id;
        w.style.width = config.w + 'px'; w.style.height = config.h + 'px';
        w.style.left = '100px'; w.style.top = '100px'; w.style.zIndex = ++zIndex;

        w.innerHTML = `
            <div class="win-bar" onmousedown="dragS(event, '${id}')">
                <div class="traffic-lights"><div class="tb tb-close" onclick="closeW('${id}')">×</div><div class="tb tb-min" onclick="minW('${id}')">−</div><div class="tb tb-max" onclick="maxW('${id}')">⤢</div></div>
                <span style="margin:auto; font-size:12px; opacity:0.7;">${config.title}</span>
            </div>
            <div class="win-content">${config.html}</div>
        `;
        os.appendChild(w); wins[id] = w;
        requestAnimationFrame(() => w.classList.remove('genie-hide'));
        lucide.createIcons();
    }

    // Customization Functions
    window.setWP = (val) => document.getElementById('wallpaper').style.background = val;
    window.setBrightness = (val) => document.getElementById('brightness-overlay').style.opacity = val;

    function closeW(id) { wins[id].classList.add('genie-hide'); setTimeout(() => { if(wins[id]) { os.removeChild(wins[id]); delete wins[id]; } }, 450); }
    function minW(id) { wins[id].classList.add('genie-hide'); }
    function maxW(id) { wins[id].classList.toggle('fullscreen'); }
    function focusWin(id) { wins[id].style.zIndex = ++zIndex; document.getElementById('active-app').innerText = apps[id].title; }

    // ZERO-LAG DRAGGING
    let dWin = null, offset = {x:0, y:0};
    function dragS(e, id) { 
        if(wins[id].classList.contains('fullscreen')) return;
        focusWin(id); 
        dWin = wins[id];
        dWin.classList.add('dragging'); // Temporarily disable transitions for raw performance
        offset = { x: e.clientX - dWin.offsetLeft, y: e.clientY - dWin.offsetTop }; 
    }

    document.addEventListener('mousemove', e => {
        if (!dWin) return;
        // requestAnimationFrame ensures the move matches the screen refresh exactly
        requestAnimationFrame(() => {
            if(dWin) {
                dWin.style.left = (e.clientX - offset.x) + 'px';
                dWin.style.top = (e.clientY - offset.y) + 'px';
            }
        });
    });

    document.addEventListener('mouseup', () => { 
        if(dWin) dWin.classList.remove('dragging');
        dWin = null; 
    });

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
    window.onload = () => { lucide.createIcons(); openApp('settings'); };
</script>
</body>
</html>
