<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NextOS - Pro Max</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            /* Your custom wallpaper is now hardcoded here */
            --bg: url('https://cdn.discordapp.com/attachments/1490821953358135490/1493680820463075468/Next_wallapaper.png?ex=69dfda2a&is=69de88aa&hm=f9e15d54534736f2211ba7f7584bb31c6b6e1a8bb4762dcc2b7d941884c6ae3b&'); 
            --brightness: 1; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-user-select: none; user-select: none; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        
        #os { 
            width: 100%; height: 100%; position: relative; 
            background: #0d1f3c var(--bg) no-repeat center center; 
            background-size: cover;
            filter: brightness(var(--brightness));
        }

        /* Top Menubar */
        #menubar {
            position: absolute; top: 0; width: 100%; height: 28px;
            background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(30px);
            display: flex; align-items: center; padding: 0 15px; z-index: 10000;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1); color: white; font-size: 13px;
        }
        .menu-bold { font-weight: 700; margin-right: 20px; }
        .menu-item { margin-right: 15px; font-weight: 400; opacity: 0.8; }

        /* Window System */
        .win {
            position: absolute; border-radius: 12px; overflow: hidden;
            background: rgba(30, 30, 35, 0.98); backdrop-filter: blur(50px);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); display: flex; flex-direction: column;
            will-change: transform; transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1), opacity 0.3s;
        }
        .win.dragging { transition: none !important; }
        .win.genie-hide { transform: scale(0) translateY(600px); opacity: 0; pointer-events: none; }

        /* Horizontal Traffic Lights with Icons */
        .win-bar { height: 38px; display: flex; align-items: center; padding: 0 12px; cursor: move; background: rgba(255, 255, 255, 0.03); }
        .traffic-lights { display: flex; gap: 8px; margin-right: 15px; }
        .tb { width: 12px; height: 12px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; cursor: pointer; }
        .win-bar:hover .tb { color: rgba(0,0,0,0.5); }
        .tb-close { background: #ff5f57; } .tb-min { background: #febc2e; } .tb-max { background: #28c840; }

        .win-content { flex: 1; overflow: auto; color: white; background: #1c1c1e; }

        /* Calculator UI */
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); height: 100%; background: #333; }
        .c-btn { border: 0.1px solid #222; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        .c-btn:active { background: #555; }

        /* Calendar UI */
        .cal-nav { display: flex; justify-content: space-between; padding: 10px; align-items: center; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; padding: 10px; }
        .cal-day { padding: 10px; text-align: center; border-radius: 4px; font-size: 13px; }
        .cal-today { background: #007aff; font-weight: bold; border-radius: 8px; }

        /* Dock */
        #dock-container { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); padding: 8px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(30px); border-radius: 20px; z-index: 9999; }
        #dock { display: flex; gap: 10px; }
        .dk { width: 50px; height: 50px; border-radius: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; color: white; background: rgba(255,255,255,0.1); }
        .dk:hover { transform: scale(1.2) translateY(-5px); }
    </style>
</head>
<body>

<div id="os">
    <div id="menubar">
        <i data-lucide="apple" style="width:14px; margin-right:15px;"></i>
        <span class="menu-bold" id="active-app-name">Finder</span>
        <span class="menu-item">File</span><span class="menu-item">Edit</span><span class="menu-item">View</span><span class="menu-item">Go</span><span class="menu-item">Window</span><span class="menu-item">Help</span>
        <span id="clock" style="margin-left:auto; font-weight: 500;">--:--</span>
    </div>

    <div id="dock-container">
        <div id="dock">
            <div class="dk" onclick="openApp('browser')"><i data-lucide="globe"></i></div>
            <div class="dk" onclick="openApp('calc')"><i data-lucide="calculator"></i></div>
            <div class="dk" onclick="openApp('calendar')"><i data-lucide="calendar"></i></div>
            <div class="dk" onclick="openApp('weather')"><i data-lucide="cloud-sun"></i></div>
            <div class="dk" onclick="openApp('settings')"><i data-lucide="settings"></i></div>
        </div>
    </div>
</div>

<script>
    const os = document.getElementById('os');
    let zIndex = 1000;
    const wins = {};
    let curDate = new Date();

    const apps = {
        browser: { title: 'Safari', w: 850, h: 550, html: `<iframe src="https://www.google.com/search?igu=1" style="width:100%; height:100%; border:none; background:white;"></iframe>` },
        calc: { title: 'Calculator', w: 260, h: 400, html: `
            <div style="height:100%; display:flex; flex-direction:column;">
                <div id="c-scr" style="padding:25px; text-align:right; font-size:36px; background:#111;">0</div>
                <div class="calc-grid">
                    <div class="c-btn" onclick="p('7')">7</div><div class="c-btn" onclick="p('8')">8</div><div class="c-btn" onclick="p('9')">9</div><div class="c-btn" style="background:#ff9f0a" onclick="p('/')">÷</div>
                    <div class="c-btn" onclick="p('4')">4</div><div class="c-btn" onclick="p('5')">5</div><div class="c-btn" onclick="p('6')">6</div><div class="c-btn" style="background:#ff9f0a" onclick="p('*')">×</div>
                    <div class="c-btn" onclick="p('1')">1</div><div class="c-btn" onclick="p('2')">2</div><div class="c-btn" onclick="p('3')">3</div><div class="c-btn" style="background:#ff9f0a" onclick="p('-')">-</div>
                    <div class="c-btn" onclick="p('0')" style="grid-column:span 2">0</div><div class="c-btn" onclick="solv()">=</div><div class="c-btn" style="background:#ff9f0a" onclick="p('+')">+</div>
                </div>
            </div>` },
        calendar: { title: 'Calendar', w: 400, h: 420, html: `<div id="cal-app"></div>` },
        weather: { title: 'Weather', w: 300, h: 380, html: `<div style="padding:40px; text-align:center; background:linear-gradient(#4facfe, #00f2fe); height:100%;"><i data-lucide="sun" style="width:60px;height:60px;margin-bottom:10px;"></i><h1 style="font-size:48px;">72°</h1><p>Sunny</p></div>` },
        settings: { title: 'Settings', w: 450, h: 200, html: `<div style="padding:30px;"><h3>Brightness</h3><input type="range" min="0.3" max="1" step="0.01" value="1" oninput="document.documentElement.style.setProperty('--brightness', this.value)" style="width:100%; margin-top:20px;"></div>` }
    };

    function renderCalendar() {
        const app = document.getElementById('cal-app');
        if (!app) return;
        const month = curDate.getMonth(), year = curDate.getFullYear();
        const firstDay = new Date(year, month, 1).getDay(), lastDate = new Date(year, month + 1, 0).getDate();
        app.innerHTML = `<div class="cal-nav"><button onclick="changeMonth(-1)" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="chevron-left"></i></button><b>${curDate.toLocaleString('default', { month: 'long' })} ${year}</b><button onclick="changeMonth(1)" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="chevron-right"></i></button></div><div class="cal-grid" id="cg"></div>`;
        const g = document.getElementById('cg');
        const days = ['S','M','T','W','T','F','S'];
        days.forEach(d => g.innerHTML += `<div style="text-align:center; opacity:0.5; font-size:11px; padding-bottom:10px;">${d}</div>`);
        for (let i = 0; i < firstDay; i++) g.innerHTML += `<div></div>`;
        for (let i = 1; i <= lastDate; i++) {
            const isToday = i === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();
            g.innerHTML += `<div class="cal-day ${isToday ? 'cal-today' : ''}">${i}</div>`;
        }
        lucide.createIcons();
    }

    window.changeMonth = (d) => { curDate.setMonth(curDate.getMonth() + d); renderCalendar(); };

    function openApp(id) {
        if (wins[id]) { wins[id].classList.remove('genie-hide'); focusWin(id); return; }
        const config = apps[id];
        const w = document.createElement('div');
        w.className = 'win genie-hide'; w.id = 'win-' + id;
        w.style.width = config.w + 'px'; w.style.height = config.h + 'px';
        w.style.left = (window.innerWidth/2 - config.w/2) + 'px'; w.style.top = '100px';
        w.style.zIndex = ++zIndex;
        w.innerHTML = `<div class="win-bar" onmousedown="startDrag(event, '${id}')"><div class="traffic-lights"><div class="tb tb-close" onclick="closeApp('${id}')">×</div><div class="tb tb-min" onclick="minApp('${id}')">-</div><div class="tb tb-max" onclick="maxApp('${id}')">+</div></div><span style="margin:auto;font-size:12px;font-weight:600;opacity:0.8;">${config.title}</span></div><div class="win-content">${config.html}</div>`;
        os.appendChild(w); wins[id] = w;
        setTimeout(() => { w.classList.remove('genie-hide'); if(id == 'calendar') renderCalendar(); lucide.createIcons(); }, 10);
    }

    function closeApp(id) { wins[id].classList.add('genie-hide'); setTimeout(() => { if(wins[id]){os.removeChild(wins[id]); delete wins[id];} }, 400); }
    function minApp(id) { wins[id].classList.add('genie-hide'); }
    function maxApp(id) { wins[id].classList.toggle('fullscreen'); }
    function focusWin(id) { wins[id].style.zIndex = ++zIndex; document.getElementById('active-app-name').innerText = apps[id].title; }

    let dWin = null, off = {x:0, y:0};
    function startDrag(e, id) { focusWin(id); dWin = wins[id]; dWin.classList.add('dragging'); off = { x: e.clientX - dWin.offsetLeft, y: e.clientY - dWin.offsetTop }; }
    document.addEventListener('mousemove', (e) => { if (dWin) { dWin.style.left = (e.clientX - off.x) + 'px'; dWin.style.top = (e.clientY - off.y) + 'px'; } });
    document.addEventListener('mouseup', () => { if(dWin) dWin.classList.remove('dragging'); dWin = null; });

    let v = "";
    window.p = (n) => { v += n; document.getElementById('c-scr').innerText = v; };
    window.solv = () => { try { v = eval(v.replace('÷','/').replace('×','*')).toString(); document.getElementById('c-scr').innerText = v; } catch { v = ""; } };

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
    window.onload = () => { lucide.createIcons(); openApp('calendar'); };
</script>
</body>
</html>
