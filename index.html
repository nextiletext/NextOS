<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextOS - Ultimate Edition</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: linear-gradient(135deg, #0d1f3c 0%, #1a1035 100%); --brightness: 1; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        #os { 
            width: 100vw; height: 100vh; position: relative; 
            background: var(--bg); background-size: cover; background-position: center;
            filter: brightness(var(--brightness));
        }

        /* Fixed Top Menubar */
        #menubar {
            position: absolute; top: 0; width: 100%; height: 28px;
            background: rgba(20, 20, 25, 0.75); backdrop-filter: blur(30px);
            display: flex; align-items: center; padding: 0 15px; z-index: 10000;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1); color: white; font-size: 13px;
        }
        .menu-bold { font-weight: 700; margin-right: 20px; }
        .menu-item { margin-right: 15px; font-weight: 400; opacity: 0.9; cursor: default; }

        /* Window Styling */
        .win {
            position: absolute; border-radius: 12px; overflow: hidden;
            background: rgba(30, 30, 35, 0.98); backdrop-filter: blur(50px);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); display: flex; flex-direction: column;
            will-change: transform; transform: translateZ(0);
            transition: transform 0.4s cubic-bezier(0.2, 0, 0, 1), opacity 0.3s;
            transform-origin: bottom center;
        }
        .win.dragging { transition: none !important; }
        .win.genie-hide { transform: scale(0.05) translateY(800px); opacity: 0; pointer-events: none; }
        .win.fullscreen { width: 100vw !important; height: calc(100vh - 28px) !important; top: 28px !important; left: 0 !important; border-radius: 0; }

        /* Title Bar & Traffic Lights */
        .win-bar { height: 38px; display: flex; align-items: center; padding: 0 12px; cursor: move; background: rgba(255, 255, 255, 0.03); }
        .traffic-lights { display: flex; gap: 8px; margin-right: 15px; }
        .tb { width: 12px; height: 12px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; cursor: pointer; transition: color 0.1s; }
        .win-bar:hover .tb { color: rgba(0,0,0,0.5); }
        .tb-close { background: #ff5f57; } .tb-min { background: #febc2e; } .tb-max { background: #28c840; }

        .win-content { flex: 1; overflow: auto; color: white; background: #1e1e1e; }

        /* App Specific UIs */
        .weather-card { padding: 30px; text-align: center; background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); height: 100%; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 10px; text-align: center; }
        .cal-day { padding: 15px; border-radius: 8px; font-size: 14px; }
        .cal-today { background: #007aff; font-weight: bold; }

        /* Dock */
        #dock-container { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); padding: 8px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(30px); border-radius: 20px; z-index: 9999; border: 0.5px solid rgba(255,255,255,0.2); }
        #dock { display: flex; gap: 10px; }
        .dk { width: 50px; height: 50px; border-radius: 12px; cursor: pointer; transition: 0.2s cubic-bezier(0.2, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; color: white; background: rgba(255,255,255,0.1); }
        .dk:hover { transform: scale(1.3) translateY(-10px); background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="os">
    <div id="menubar">
        <i data-lucide="apple" style="width:14px; margin-right:15px;"></i>
        <span class="menu-bold" id="active-app-name">Finder</span>
        <span class="menu-item">File</span>
        <span class="menu-item">Edit</span>
        <span class="menu-item">View</span>
        <span class="menu-item">Go</span>
        <span class="menu-item">Window</span>
        <span class="menu-item">Help</span>
        <span id="clock" style="margin-left:auto; font-weight: 500;">--:--</span>
    </div>

    <div id="dock-container">
        <div id="dock">
            <div class="dk" onclick="openApp('browser')"><i data-lucide="globe"></i></div>
            <div class="dk" onclick="openApp('calc')"><i data-lucide="calculator"></i></div>
            <div class="dk" onclick="openApp('calendar')"><i data-lucide="calendar"></i></div>
            <div class="dk" onclick="openApp('weather')"><i data-lucide="cloud-sun"></i></div>
            <div class="dk" onclick="openApp('photos')"><i data-lucide="image"></i></div>
            <div class="dk" onclick="openApp('settings')"><i data-lucide="settings"></i></div>
        </div>
    </div>
</div>

<script>
    const os = document.getElementById('os');
    let zIndex = 1000;
    const wins = {};

    const apps = {
        browser: { title: 'Browser', w: 900, h: 600, html: `<iframe src="https://www.google.com/search?igu=1" style="width:100%; height:100%; border:none; background:white;"></iframe>` },
        calc: { title: 'Calculator', w: 260, h: 420, html: `<div style="height:100%; display:flex; flex-direction:column;"><div id="c-scr" style="padding:25px; text-align:right; font-size:40px; background:#111;">0</div><div style="display:grid; grid-template-columns:repeat(4,1fr); flex:1; background:#333;"><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;cursor:pointer" onclick="p('7')">7</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;cursor:pointer" onclick="p('8')">8</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;cursor:pointer" onclick="p('9')">9</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;background:#ff9f0a;cursor:pointer" onclick="p('/')">÷</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;cursor:pointer" onclick="p('4')">4</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;cursor:pointer" onclick="p('5')">5</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;cursor:pointer" onclick="p('6')">6</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;background:#ff9f0a;cursor:pointer" onclick="p('*')">×</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;cursor:pointer" onclick="p('1')">1</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;cursor:pointer" onclick="p('2')">2</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;cursor:pointer" onclick="p('3')">3</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;background:#ff9f0a;cursor:pointer" onclick="p('-')">−</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;cursor:pointer;grid-column:span 2" onclick="p('0')">0</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;background:#ff9f0a;cursor:pointer" onclick="solv()">=</div><div style="display:flex;align-items:center;justify-content:center;border:0.1px solid #222;background:#ff9f0a;cursor:pointer" onclick="p('+')">+</div></div></div>` },
        calendar: { title: 'Calendar', w: 450, h: 400, html: `<div style="padding:20px; text-align:center;"><h2>April 2026</h2></div><div class="cal-grid"><div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div class="cal-day">1</div><div class="cal-day">2</div><div class="cal-day">3</div><div class="cal-day">4</div><div class="cal-day">5</div><div class="cal-day">6</div><div class="cal-day">7</div><div class="cal-day">8</div><div class="cal-day">9</div><div class="cal-day">10</div><div class="cal-day">11</div><div class="cal-day">12</div><div class="cal-day">13</div><div class="cal-day cal-today">14</div></div>` },
        weather: { title: 'Weather', w: 300, h: 400, html: `<div class="weather-card"><i data-lucide="sun" style="width:60px; height:60px; margin-bottom:10px;"></i><h1>72°</h1><p>Sunny</p><p style="margin-top:20px; opacity:0.8;">H: 78° L: 64°</p></div>` },
        photos: { title: 'Photos', w: 600, h: 400, html: `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:15px;"><img src="https://picsum.photos/200/200?1" style="width:100%; border-radius:8px;"><img src="https://picsum.photos/200/200?2" style="width:100%; border-radius:8px;"><img src="https://picsum.photos/200/200?3" style="width:100%; border-radius:8px;"></div>` },
        settings: { title: 'Settings', w: 500, h: 400, html: `<div style="padding:30px;"><h3>Brightness</h3><input type="range" min="0.3" max="1" step="0.01" value="1" oninput="document.documentElement.style.setProperty('--brightness', this.value)" style="width:100%; margin:20px 0;"><h3>Wallpaper</h3><div style="display:flex; gap:10px;"><div style="width:50px; height:50px; background:linear-gradient(45deg, #f093fb, #f5576c); border-radius:8px; cursor:pointer;" onclick="setWp(this.style.background)"></div><div style="width:50px; height:50px; background:#111; border-radius:8px; cursor:pointer;" onclick="setWp(this.style.background)"></div></div><p style="margin-top:40px; opacity:0.5; font-size:12px;">NextOS v2026.04</p></div>` }
    };

    function openApp(id) {
        if (wins[id]) { wins[id].classList.remove('genie-hide'); focusWin(id); return; }
        const config = apps[id];
        const w = document.createElement('div');
        w.className = 'win genie-hide'; w.id = 'win-' + id;
        w.style.width = config.w + 'px'; w.style.height = config.h + 'px';
        w.style.left = (window.innerWidth/2 - config.w/2) + 'px';
        w.style.top = '100px'; w.style.zIndex = ++zIndex;

        w.innerHTML = `
            <div class="win-bar" onmousedown="startDrag(event, '${id}')">
                <div class="traffic-lights">
                    <div class="tb tb-close" onclick="closeApp('${id}')">×</div>
                    <div class="tb tb-min" onclick="minApp('${id}')">−</div>
                    <div class="tb tb-max" onclick="maxApp('${id}')">+</div>
                </div>
                <span style="margin:auto; font-size:12px; font-weight:600; opacity:0.8;">${config.title}</span>
            </div>
            <div class="win-content">${config.html}</div>
        `;
        os.appendChild(w); wins[id] = w;
        requestAnimationFrame(() => w.classList.remove('genie-hide'));
        lucide.createIcons();
    }

    window.setWp = (v) => document.documentElement.style.setProperty('--bg', v);
    function closeApp(id) { wins[id].classList.add('genie-hide'); setTimeout(() => { if(wins[id]) { os.removeChild(wins[id]); delete wins[id]; } }, 400); }
    function minApp(id) { wins[id].classList.add('genie-hide'); }
    function maxApp(id) { wins[id].classList.toggle('fullscreen'); }
    function focusWin(id) { wins[id].style.zIndex = ++zIndex; document.getElementById('active-app-name').innerText = apps[id].title; }

    let dWin = null, offset = {x:0, y:0};
    function startDrag(e, id) {
        if(wins[id].classList.contains('fullscreen')) return;
        focusWin(id); dWin = wins[id]; dWin.classList.add('dragging');
        offset = { x: e.clientX - dWin.offsetLeft, y: e.clientY - dWin.offsetTop };
    }

    document.addEventListener('mousemove', (e) => {
        if (!dWin) return;
        requestAnimationFrame(() => {
            if (dWin) {
                dWin.style.left = (e.clientX - offset.x) + 'px';
                dWin.style.top = (e.clientY - offset.y) + 'px';
            }
        });
    });

    document.addEventListener('mouseup', () => { if(dWin) dWin.classList.remove('dragging'); dWin = null; });

    let val = "";
    window.p = (v) => { val += v; document.getElementById('c-scr').innerText = val; };
    window.solv = () => { try { val = eval(val).toString(); document.getElementById('c-scr').innerText = val; } catch { val = "0"; document.getElementById('c-scr').innerText = "Err"; } };

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
    window.onload = () => { lucide.createIcons(); openApp('browser'); };
</script>
</body>
</html>
