<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextOS - Genie Effect</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #os { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #wallpaper { position: absolute; inset: 0; background: linear-gradient(135deg, #0d1f3c 0%, #1a1035 100%); z-index: 0; }

        /* Menubar */
        #menubar {
            position: absolute; top: 0; left: 0; right: 0; height: 30px;
            background: rgba(12, 14, 20, 0.6); backdrop-filter: blur(25px);
            display: flex; align-items: center; padding: 0 15px; z-index: 10000;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1); color: white;
        }

        /* Window System with Genie Animation */
        .win {
            position: absolute; border-radius: 12px; overflow: hidden;
            background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column;
            
            /* The Genie Magic */
            transition: transform 0.4s cubic-bezier(0.44, 0.05, 0.55, 0.95), opacity 0.3s ease;
            transform-origin: bottom center; /* Sucks down toward the dock */
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* State when closed/closing */
        .win.closing {
            transform: scale(0.1) translateY(500px);
            opacity: 0;
            pointer-events: none;
        }

        .win-bar { height: 38px; display: flex; align-items: center; padding: 0 15px; gap: 8px; cursor: move; background: rgba(255, 255, 255, 0.05); }
        .tb-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .tb-close { background: #ff5f57; }
        .tb-min { background: #febc2e; }
        .tb-max { background: #28c840; }
        .win-content { flex: 1; overflow: hidden; }

        /* Dock */
        #dock-container { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); padding: 8px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(30px); border-radius: 22px; border: 0.5px solid rgba(255,255,255,0.2); z-index: 9999; }
        #dock { display: flex; gap: 12px; }
        .dk { width: 52px; height: 52px; border-radius: 14px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); color: white; }
        .dk:hover { transform: scale(1.2) translateY(-5px); }
    </style>
</head>
<body>

<div id="os">
    <div id="wallpaper"></div>
    <div id="menubar">
        <i data-lucide="apple" style="width:16px; margin-right:15px; color:white;"></i>
        <span id="active-app" style="color:white; font-size:13px; font-weight:700;">Finder</span>
        <span id="clock" style="margin-left:auto; color:white; font-size:12px;">--:--</span>
    </div>

    <div id="dock-container">
        <div id="dock">
            <div class="dk" onclick="openApp('finder')"><i data-lucide="folder"></i></div>
            <div class="dk" onclick="openApp('safari')"><i data-lucide="compass"></i></div>
            <div class="dk" onclick="openApp('calc')"><i data-lucide="calculator"></i></div>
        </div>
    </div>
</div>

<script>
    const os = document.getElementById('os');
    let zIndex = 1000;
    const wins = {};

    const apps = {
        finder: { title: 'Finder', w: 600, h: 400, html: `<div style="padding:20px; color:white;">Finder Content</div>` },
        safari: { title: 'Safari', w: 800, h: 500, html: `<iframe src="https://www.wikipedia.org" style="width:100%; height:100%; border:none;"></iframe>` },
        calc: { title: 'Calculator', w: 260, h: 380, html: `<div style="color:white; padding:20px;">Calc</div>` }
    };

    function openApp(id) {
        if (wins[id]) {
            const w = wins[id];
            w.classList.remove('closing');
            focusWin(id);
            return;
        }
        
        const config = apps[id];
        const w = document.createElement('div');
        w.className = 'win closing'; // Start closed for the "pop out" animation
        w.id = 'win-' + id;
        w.style.width = config.w + 'px';
        w.style.height = config.h + 'px';
        w.style.left = (window.innerWidth/2 - config.w/2) + 'px';
        w.style.top = '100px';
        w.style.zIndex = ++zIndex;

        w.innerHTML = `
            <div class="win-bar" onmousedown="dragStart(event, '${id}')">
                <div class="tb-btn tb-close" onclick="closeWin('${id}')"></div>
                <div class="tb-btn tb-min" onclick="closeWin('${id}')"></div>
                <div class="tb-btn tb-max"></div>
                <span style="margin:auto; font-size:12px; color:white; opacity:0.7;">${config.title}</span>
            </div>
            <div class="win-content">${config.html}</div>
        `;
        
        os.appendChild(w);
        wins[id] = w;
        
        // Trigger the opening animation
        setTimeout(() => {
            w.classList.remove('closing');
        }, 10);
        
        lucide.createIcons();
    }

    function closeWin(id) {
        const w = wins[id];
        w.classList.add('closing'); // Trigger the "suck back" animation
        
        // Remove from DOM after animation finishes
        setTimeout(() => {
            if(w.classList.contains('closing')) {
                os.removeChild(w);
                delete wins[id];
            }
        }, 400); 
    }

    function focusWin(id) { 
        wins[id].style.zIndex = ++zIndex; 
        document.getElementById('active-app').innerText = apps[id].title;
    }

    let drag = null, offset = {x:0, y:0};
    function dragStart(e, id) { 
        focusWin(id); 
        drag = wins[id]; 
        offset = { x: e.clientX - drag.offsetLeft, y: e.clientY - drag.offsetTop }; 
    }
    
    document.addEventListener('mousemove', e => {
        if (drag) {
            drag.style.left = (e.clientX - offset.x) + 'px';
            drag.style.top = (e.clientY - offset.y) + 'px';
        }
    });

    document.addEventListener('mouseup', () => drag = null);

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
    window.onload = () => { lucide.createIcons(); openApp('finder'); };
</script>
</body>
</html>
