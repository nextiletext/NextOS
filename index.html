<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NextOS - Pro 12h Build</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: url('https://cdn.discordapp.com/attachments/1490821953358135490/1493679242230104235/NextOS_wallpaper.png?ex=69dfd8b2&is=69de8732&hm=5e463232114b4fab3c4d65a07420822a271d5d3a5d1998f8472862886a915221&'); 
            --brightness: 1; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-user-select: none; user-select: none; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        #os { width: 100%; height: 100%; position: relative; background: #0d1f3c var(--bg) center/cover; filter: brightness(var(--brightness)); display: none; }

        /* LOCK SCREEN */
        #lock-screen { position: fixed; inset: 0; z-index: 20000; background: var(--bg) center/cover; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        #lock-screen.unlocked { transform: translateY(-100%); }
        .lock-blur { position: absolute; inset: 0; backdrop-filter: blur(35px); background: rgba(0,0,0,0.3); z-index: -1; }
        #lock-time { font-size: 100px; color: white; font-weight: 200; }
        #pass-box { margin-top: 20px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); padding: 12px 30px; border-radius: 25px; color: white; text-align: center; outline: none; backdrop-filter: blur(15px); }

        /* MENUBAR */
        #menubar { position: absolute; top: 0; width: 100%; height: 28px; background: rgba(20, 20, 25, 0.75); backdrop-filter: blur(30px); display: flex; align-items: center; padding: 0 15px; z-index: 10000; border-bottom: 0.5px solid rgba(255, 255, 255, 0.1); color: white; font-size: 13px; }
        .apple-logo { cursor: pointer; display: flex; align-items: center; padding: 0 10px; margin-left: -10px; height: 100%; position: relative; }
        .dropdown { position: absolute; top: 28px; left: 5px; width: 200px; background: rgba(35, 35, 40, 0.95); backdrop-filter: blur(40px); border-radius: 6px; border: 0.5px solid rgba(255,255,255,0.1); padding: 5px; display: none; }
        .dropdown.active { display: block; }
        .drop-item { padding: 4px 12px; border-radius: 4px; font-size: 13px; color: white; cursor: default; }
        .drop-item:hover { background: #007aff; }
        .gemini-sparkle { width: 16px; height: 16px; margin-right: 8px; vertical-align: middle; }
        .m-item { margin-left: 15px; opacity: 0.9; cursor: default; }
        .m-bold { font-weight: 700; margin-left: 10px; }

        /* WINDOWS */
        .win { position: absolute; border-radius: 12px; overflow: hidden; background: rgba(30, 30, 35, 0.98); backdrop-filter: blur(50px); border: 0.5px solid rgba(255, 255, 255, 0.2); box-shadow: 0 40px 80px rgba(0,0,0,0.6); display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; }
        .win.minimized { transform: scale(0) translateY(800px); opacity: 0; pointer-events: none; }
        .win.fullscreen { width: 100vw !important; height: calc(100vh - 28px) !important; top: 28px !important; left: 0 !important; border-radius: 0; }
        .win-bar { height: 38px; display: flex; align-items: center; padding: 0 12px; cursor: move; background: rgba(255, 255, 255, 0.05); }
        
        .traffic-lights { display: flex; gap: 8px; margin-right: 15px; }
        .tb { width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; transition: color 0.1s; font-weight: bold; }
        .win-bar:hover .tb { color: rgba(0,0,0,0.6); }
        .tb-close { background: #ff5f57; } .tb-close::before { content: '×'; }
        .tb-min { background: #febc2e; } .tb-min::before { content: '−'; }
        .tb-max { background: #28c840; } .tb-max::before { content: '⤢'; }

        /* APPS */
        .browser-container { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; color: #333; padding: 20px; text-align: center; }
        .browser-url { width: 80%; max-width: 500px; padding: 12px 20px; border-radius: 24px; border: 1px solid #dfe1e5; font-size: 16px; outline: none; margin-bottom: 20px; box-shadow: 0 1px 6px rgba(32,33,36,0.28); }

        /* DOCK */
        #dock-container { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); padding: 8px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(30px); border-radius: 20px; z-index: 9999; border: 0.5px solid rgba(255,255,255,0.2); }
        #dock { display: flex; gap: 12px; }
        .dk { width: 52px; height: 52px; border-radius: 13px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; color: white; background: rgba(255,255,255,0.15); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .dk:hover { transform: scale(1.2) translateY(-5px); background: rgba(255,255,255,0.3); }

        .win-content { flex: 1; overflow: hidden; background: #1c1c1e; color: white; }
    </style>
</head>
<body onclick="closeMenu()">

<div id="lock-screen"><div class="lock-blur"></div><div id="lock-time">00:00 AM</div><input type="password" id="pass-box" placeholder="Enter Password" onkeydown="if(event.key==='Enter') unlock()"></div>

<div id="os">
    <div id="menubar">
        <div class="apple-logo" onclick="event.stopPropagation(); toggleMenu()"><i data-lucide="apple" style="width:16px;"></i>
            <div class="dropdown" id="apple-dropdown">
                <div class="drop-item" onclick="lockOS()">Lock Screen</div>
            </div>
        </div>
        <img src="https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d4735304ef629dc620163.svg" class="gemini-sparkle">
        <span class="m-bold" id="active-app-name">Finder</span>
        <span class="m-item">File</span><span class="m-item">Edit</span><span class="m-item">View</span><span class="m-item">Go</span><span class="m-item">Window</span><span class="m-item">Help</span>
        <span id="clock-container" style="margin-left:auto; font-weight:500;">
            <span id="menubar-date" style="margin-right:10px;"></span>
            <span id="clock">00:00 AM</span>
        </span>
    </div>

    <div id="dock-container"><div id="dock">
        <div class="dk" title="Safari" onclick="openApp('browser')"><i data-lucide="globe"></i></div>
        <div class="dk" title="Calculator" onclick="openApp('calc')"><i data-lucide="calculator"></i></div>
        <div class="dk" title="Calendar" onclick="openApp('calendar')"><i data-lucide="calendar"></i></div>
        <div class="dk" title="Terminal" onclick="openApp('terminal')"><i data-lucide="terminal"></i></div>
        <div class="dk" title="Weather" onclick="openApp('weather')"><i data-lucide="cloud-sun"></i></div>
        <div class="dk" title="Settings" onclick="openApp('settings')"><i data-lucide="settings"></i></div>
    </div></div>
</div>

<script>
    const os = document.getElementById('os'), lock = document.getElementById('lock-screen'), dropdown = document.getElementById('apple-dropdown');
    let zIndex = 1000, wins = {}, viewDate = new Date(), calcVal = "";
    const today = new Date();

    const apps = {
        browser: { 
            title: 'Safari', w: 700, h: 450, 
            content: () => `
                <div class="browser-container">
                    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" style="width:150px; margin-bottom:20px;">
                    <input class="browser-url" placeholder="Search the web..." onkeydown="if(event.key==='Enter') window.open('https://www.google.com/search?q=' + encodeURIComponent(this.value), '_blank')">
                    <p style="font-size:12px; color:#666;">Press Enter to search (New Tab)</p>
                </div>` 
        },
        calc: { title: 'Calculator', w: 280, h: 420, content: () => `<div id="d" style="padding:20px; font-size:40px; text-align:right; height:70px; background:#111;">0</div><div style="display:grid; grid-template-columns:repeat(4,1fr); height:calc(100% - 70px);">${["C","±","%","/","7","8","9","*","4","5","6","-","1","2","3","+","0",".","="].map(b=>`<div onclick="hC('${b}')" style="border:0.2px solid #2c2c2e; display:flex; align-items:center; justify-content:center; cursor:pointer; background:#333;">${b}</div>`).join('')}</div>` },
        calendar: { title: 'Calendar', w: 350, h: 400, content: () => `<div id="cal-root"></div>` },
        terminal: { title: 'Terminal', w: 600, h: 350, content: () => `<div style="padding:10px; color:#0f0; font-family:monospace; height:100%; overflow-y:auto;"><div id="log">NextOS Shell [v14.0]</div><div style="display:flex;">> <input id="ti" onkeydown="if(event.key==='Enter') {document.getElementById('log').innerHTML+='<br>> '+this.value; this.value='';}" style="background:none; border:none; color:#0f0; outline:none; flex:1; margin-left:5px;"></div></div>` },
        weather: { title: 'Weather', w: 300, h: 400, content: () => `<div style="height:100%; background:linear-gradient(#1d3ede, #01befe); padding:40px; text-align:center;"><i data-lucide="sun" style="width:50px; height:50px;"></i><h1>22°C</h1><p>Sunny</p></div>` },
        settings: { title: 'Settings', w: 400, h: 250, content: () => `<div style="padding:20px;"><h3>Brightness</h3><input type="range" min="0.3" max="1" step="0.01" value="1" oninput="document.documentElement.style.setProperty('--brightness', this.value)" style="width:100%;"></div>` }
    };

    function unlock() { lock.classList.add('unlocked'); os.style.display = 'block'; }
    function lockOS() { lock.classList.remove('unlocked'); closeMenu(); }
    function toggleMenu() { dropdown.classList.toggle('active'); }
    function closeMenu() { dropdown.classList.remove('active'); }

    function openApp(id) {
        if (wins[id]) { wins[id].classList.remove('minimized'); wins[id].style.zIndex = ++zIndex; return; }
        const a = apps[id], w = document.createElement('div');
        w.className = 'win'; w.id = 'win-'+id; w.style.width = a.w+'px'; w.style.height = a.h+'px';
        w.style.left = '100px'; w.style.top = '100px'; w.style.zIndex = ++zIndex;
        w.innerHTML = `<div class="win-bar" onmousedown="sD(event,'${id}')"><div class="traffic-lights"><button class="tb tb-close" onclick="cA('${id}')"></button><button class="tb tb-min" onclick="minA('${id}')"></button><button class="tb tb-max" onclick="tF('${id}')"></button></div><span style="margin:auto; font-size:12px; font-weight:600;">${a.title}</span></div><div class="win-content">${a.content()}</div>`;
        os.appendChild(w); wins[id] = w;
        if(id === 'calendar') rC();
        lucide.createIcons();
    }

    function rC() {
        const root = document.getElementById('cal-root');
        const monthDays = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
        const startDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const isCurrentMonth = viewDate.getMonth() === today.getMonth() && viewDate.getFullYear() === today.getFullYear();
        let gridHtml = '';
        for(let i=0; i<startDay; i++) gridHtml += `<div></div>`;
        for(let i=1; i<=monthDays; i++) {
            const blue = (isCurrentMonth && i === today.getDate()) ? 'background:#007aff; border-radius:50%;' : '';
            gridHtml += `<div style="padding:8px; ${blue}">${i}</div>`;
        }
        root.innerHTML = `<div style="display:flex; justify-content:space-between; padding:15px; background:#2c2c2e;"><button onclick="cD(-1)" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="chevron-left"></i></button><span>${viewDate.toLocaleString('default',{month:'long'})} ${viewDate.getFullYear()}</span><button onclick="cD(1)" style="background:none; border:none; color:white; cursor:pointer;"><i data-lucide="chevron-right"></i></button></div><div style="display:grid; grid-template-columns:repeat(7,1fr); padding:10px; text-align:center;">${gridHtml}</div>`;
        lucide.createIcons();
    }

    window.cD = (d) => { viewDate.setMonth(viewDate.getMonth()+d); rC(); };
    window.hC = (b) => { const d = document.getElementById('d'); if(b==="C") calcVal=""; else if(b==="=") {try{calcVal=eval(calcVal).toString()}catch{calcVal="Error"}} else calcVal+=b; d.innerText = calcVal||"0"; };
    window.tF = (id) => wins[id].classList.toggle('fullscreen');
    window.minA = (id) => wins[id].classList.add('minimized');
    window.cA = (id) => { os.removeChild(wins[id]); delete wins[id]; };

    let dW = null, oX, oY;
    function sD(e, id) { if(wins[id].classList.contains('fullscreen')) return; dW = wins[id]; dW.style.zIndex = ++zIndex; oX = e.clientX - dW.offsetLeft; oY = e.clientY - dW.offsetTop; document.getElementById('active-app-name').innerText = apps[id].title; }
    document.onmousemove = (e) => { if(dW) { dW.style.left = (e.clientX-oX)+'px'; dW.style.top = (e.clientY-oY)+'px'; } };
    document.onmouseup = () => dW = null;

    setInterval(() => { 
        const now = new Date();
        const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: true };
        const dateOptions = { weekday: 'short', month: 'short', day: 'numeric' };
        const tStr = now.toLocaleTimeString([], timeOptions);
        const dStr = now.toLocaleDateString([], dateOptions);
        
        document.getElementById('clock').innerText = tStr;
        document.getElementById('lock-time').innerText = tStr;
        document.getElementById('menubar-date').innerText = dStr;
    }, 1000);
    
    window.onload = () => lucide.createIcons();
</script>
</body>
</html>
