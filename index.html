<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaudeOS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000;
        }

        #os {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #1a2744;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }

        #wallpaper {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 60% 50% at 20% 80%, #0e3460 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 80% 20%, #1e1060 0%, transparent 55%),
                radial-gradient(ellipse 40% 40% at 60% 70%, #0a2040 0%, transparent 50%),
                linear-gradient(135deg, #0d1f3c 0%, #1a1035 40%, #0f2545 70%, #071520 100%);
            background-size: cover;
        }

        #menubar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 26px;
            background: rgba(12, 14, 20, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            display: flex;
            align-items: center;
            padding: 0 12px;
            z-index: 9999;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .mb-apple { width: 16px; height: 16px; margin-right: 12px; cursor: pointer; opacity: 0.9; }
        .mb-appname { font-size: 13px; font-weight: 700; color: #fff; margin-right: 12px; }
        .mb-menu { font-size: 13px; color: #fff; padding: 2px 8px; border-radius: 4px; cursor: pointer; opacity: 0.9; }
        .mb-menu:hover { background: rgba(255, 255, 255, 0.15); }
        #mb-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        #mb-clock { font-size: 12px; color: #fff; font-weight: 500; }

        .win {
            position: absolute;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(22, 22, 30, 0.94);
            backdrop-filter: blur(30px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .win-bar {
            height: 38px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 8px;
            cursor: move;
            background: rgba(40, 40, 50, 0.4);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .tb-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .tb-close { background: #ff5f57; }
        .tb-min { background: #febc2e; }
        .tb-max { background: #28c840; }
        .tb-title { position: absolute; left: 50%; transform: translateX(-50%); font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; }

        .win-content { flex: 1; overflow: hidden; }

        #dock {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px) saturate(150%);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 9998;
        }

        .dk {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.2, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dk:hover { transform: scale(1.2) translateY(-10px); }
        .dk.open::after {
            content: '';
            position: absolute;
            bottom: -5px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #fff;
        }

        /* Finder Layout */
        .finder-layout { display: flex; height: 100%; color: #fff; }
        .finder-sb { width: 160px; background: rgba(0,0,0,0.2); border-right: 0.5px solid rgba(255,255,255,0.1); padding: 10px 0; }
        .sb-sec { font-size: 11px; opacity: 0.4; padding: 10px 16px 5px; text-transform: uppercase; font-weight: 700; }
        .sb-row { padding: 6px 16px; font-size: 13px; cursor: pointer; }
        .sb-row:hover { background: rgba(255,255,255,0.1); }
        .sb-row.sel { background: rgba(255,255,255,0.15); font-weight: 500; }
        .finder-main { flex: 1; padding: 20px; overflow-y: auto; }
        .f-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 20px; }
        .f-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; text-align: center; }
        .f-item .lbl { font-size: 12px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        /* Terminal Styles */
        .term-wrap { background: #1c1c1e; height: 100%; padding: 15px; font-family: 'SF Mono', Menlo, monospace; font-size: 13px; color: #fff; }
        .term-out { height: calc(100% - 25px); overflow-y: auto; line-height: 1.5; }
        .term-inp-line { display: flex; gap: 8px; }
        .term-inp { background: transparent; border: none; outline: none; color: #30d158; flex: 1; font-family: inherit; font-size: inherit; }
        .t-blue { color: #0a84ff; }
        .t-green { color: #30d158; }
        .t-red { color: #ff453a; }

        .notif {
            position: absolute;
            top: 40px; right: 20px;
            width: 280px;
            background: rgba(30, 30, 40, 0.8);
            backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 14px;
            padding: 15px;
            color: #fff;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="os">
    <div id="wallpaper"></div>

    <div id="menubar">
        <svg class="mb-apple" viewBox="0 0 20 20" fill="white"><path d="M13.6 3.5C14.4 2.6 14.9 1.4 14.7 0.2 13.6 0.3 12.3 1 11.5 1.9 10.7 2.7 10.1 4 10.3 5.1 11.5 5.2 12.8 4.4 13.6 3.5Z"/><path d="M14.7 5.3C13.1 5.3 12.2 6.2 11.1 6.2 10 6.2 8.9 5.3 7.5 5.3 5.2 5.3 2.8 7.1 2.8 10.7 2.8 12.9 3.6 15.3 4.7 16.9 5.6 18.3 6.4 19.5 7.7 19.5 9 19.5 9.5 18.6 11.1 18.6 12.7 18.6 13.1 19.5 14.5 19.5 15.8 19.5 16.7 18.2 17.5 16.9 18.1 16 18.4 15 18.5 14.9 17 14.3 16 12.7 16 11 16 9 17.3 7.7 17.3 6.4 17.3 5.4 16.3 4.8 15.3 5 15.1 5.2 15 14.7 5.3Z"/></svg>
        <span class="mb-appname" id="mb-appname">Finder</span>
        <span class="mb-menu">File</span>
        <span class="mb-menu">Edit</span>
        <span class="mb-menu">View</span>
        <span class="mb-menu">Go</span>
        <div id="mb-right">
            <span id="mb-clock">--:--</span>
        </div>
    </div>

    <div id="dock">
        <div class="dk" onclick="openApp('finder')" title="Finder">
            <svg width="40" height="40" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#2889ff"/><circle cx="18" cy="20" r="6" fill="none" stroke="white" stroke-width="3"/><line x1="24" y1="26" x2="32" y2="34" stroke="white" stroke-width="3" stroke-linecap="round"/></svg>
        </div>
        <div class="dk" onclick="openApp('terminal')" title="Terminal">
            <svg width="40" height="40" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#1c1c1e"/><path d="M12 18L20 24L12 30" stroke="#30d158" stroke-width="3" fill="none"/><line x1="22" y1="32" x2="34" y2="32" stroke="#30d158" stroke-width="3"/></svg>
        </div>
        <div class="dk" onclick="showNotif('System','Status OK','All systems operational.')" title="Status">
            <svg width="40" height="40" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#ff9f0a"/><circle cx="24" cy="24" r="10" fill="none" stroke="white" stroke-width="3"/></svg>
        </div>
    </div>
</div>

<script>
    const os = document.getElementById('os');
    let zIndex = 100;
    const wins = {};

    function updateClock() {
        const now = new Date();
        document.getElementById('mb-clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    const appConfig = {
        finder: { title: 'Finder', w: 600, h: 400 },
        terminal: { title: 'Terminal', w: 500, h: 350 }
    };

    function openApp(id) {
        if (wins[id]) {
            focusWin(id);
            return;
        }

        const config = appConfig[id];
        const w = document.createElement('div');
        w.className = 'win';
        w.id = 'win-' + id;
        w.style.width = config.w + 'px';
        w.style.height = config.h + 'px';
        w.style.left = (Math.random() * 50 + 100) + 'px';
        w.style.top = (Math.random() * 50 + 100) + 'px';
        w.style.zIndex = ++zIndex;

        w.innerHTML = `
            <div class="win-bar" onmousedown="startDrag(event, '${id}')">
                <div class="tb-btn tb-close" onclick="closeWin('${id}')"></div>
                <div class="tb-btn tb-min"></div>
                <div class="tb-btn tb-max"></div>
                <span class="tb-title">${config.title}</span>
            </div>
            <div class="win-content">${getAppContent(id)}</div>
        `;

        os.appendChild(w);
        wins[id] = w;
        document.getElementById('mb-appname').textContent = config.title;
    }

    function getAppContent(id) {
        if (id === 'finder') {
            return `
                <div class="finder-layout">
                    <div class="finder-sb">
                        <div class="sb-sec">Favorites</div>
                        <div class="sb-row sel">AirDrop</div>
                        <div class="sb-row">Recents</div>
                        <div class="sb-row">Applications</div>
                        <div class="sb-row">Documents</div>
                    </div>
                    <div class="finder-main">
                        <div class="f-grid">
                            <div class="f-item">📂<div class="lbl">Projects</div></div>
                            <div class="f-item">📄<div class="lbl">Notes.txt</div></div>
                            <div class="f-item">🖼️<div class="lbl">Image.png</div></div>
                        </div>
                    </div>
                </div>`;
        }
        if (id === 'terminal') {
            return `
                <div class="term-wrap">
                    <div class="term-out" id="term-out">Welcome to ClaudeOS Terminal. Type 'help'.</div>
                    <div class="term-inp-line">
                        <span>guest@os %</span>
                        <input class="term-inp" onkeydown="handleTerm(event)" autofocus>
                    </div>
                </div>`;
        }
        return '';
    }

    function focusWin(id) {
        wins[id].style.zIndex = ++zIndex;
        document.getElementById('mb-appname').textContent = appConfig[id].title;
    }

    function closeWin(id) {
        os.removeChild(wins[id]);
        delete wins[id];
    }

    let dragging = null;
    function startDrag(e, id) {
        focusWin(id);
        const win = wins[id];
        const rect = win.getBoundingClientRect();
        dragging = { id, offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
    }

    document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const win = wins[dragging.id];
        win.style.left = (e.clientX - dragging.offsetX) + 'px';
        win.style.top = (e.clientY - dragging.offsetY) + 'px';
    });

    document.addEventListener('mouseup', () => dragging = null);

    function handleTerm(e) {
        if (e.key === 'Enter') {
            const out = document.getElementById('term-out');
            const cmd = e.target.value.toLowerCase();
            out.innerHTML += `<div>guest@os % ${e.target.value}</div>`;
            if (cmd === 'help') out.innerHTML += `<div class="t-blue">Available: help, clear, date, whoami</div>`;
            else if (cmd === 'date') out.innerHTML += `<div>${new Date().toLocaleString()}</div>`;
            else if (cmd === 'clear') out.innerHTML = '';
            else out.innerHTML += `<div class="t-red">Command not found: ${cmd}</div>`;
            e.target.value = '';
            out.scrollTop = out.scrollHeight;
        }
    }

    function showNotif(app, title, msg) {
        const n = document.createElement('div');
        n.className = 'notif';
        n.innerHTML = `<strong>${app}</strong><div style="font-size:13px; font-weight:600;">${title}</div><div style="font-size:12px; opacity:0.8;">${msg}</div>`;
        os.appendChild(n);
        setTimeout(() => n.remove(), 4000);
    }

    // Auto-open Finder on start
    window.onload = () => openApp('finder');
</script>

</body>
</html>
