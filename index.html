<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextOS - Pro Edition</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        
        #os { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #wallpaper { position: absolute; inset: 0; background: linear-gradient(135deg, #0d1f3c 0%, #1a1035 100%); z-index: 0; }

        /* Menubar */
        #menubar {
            position: absolute; top: 0; left: 0; right: 0; height: 30px;
            background: rgba(12, 14, 20, 0.6); backdrop-filter: blur(25px);
            display: flex; align-items: center; padding: 0 15px; z-index: 10000;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1); color: white;
        }
        .mb-apple { width: 16px; height: 16px; margin-right: 18px; cursor: pointer; }
        .mb-appname { font-size: 13px; font-weight: 700; margin-right: 15px; }
        .mb-item { font-size: 13px; padding: 2px 10px; cursor: pointer; opacity: 0.9; }
        #mb-right { margin-left: auto; font-size: 12px; display: flex; gap: 15px; align-items: center; }

        /* Windows */
        .win {
            position: absolute; border-radius: 12px; overflow: hidden;
            background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        }
        .win-bar { height: 38px; display: flex; align-items: center; padding: 0 15px; gap: 8px; cursor: move; background: rgba(255, 255, 255, 0.05); }
        .tb-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .tb-close { background: #ff5f57; }
        .tb-min { background: #febc2e; }
        .tb-max { background: #28c840; }
        .tb-title { position: absolute; left: 50%; transform: translateX(-50%); font-size: 13px; color: white; font-weight: 600; opacity: 0.8; }
        .win-content { flex: 1; overflow: hidden; display: flex; }

        /* Finder UI Style */
        .finder-sidebar { width: 160px; background: rgba(255,255,255,0.03); border-right: 0.5px solid rgba(255,255,255,0.1); padding: 15px 10px; }
        .side-title { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); margin-bottom: 10px; padding-left: 10px; text-transform: uppercase; }
        .side-item { padding: 6px 10px; border-radius: 6px; color: white; font-size: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .side-item.active { background: rgba(255,255,255,0.1); }
        .finder-main { flex: 1; padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, 90px); gap: 20px; color: white; }
        .f-item { text-align: center; font-size: 11px; }
        .f-icon { width: 32px; height: 32px; color: #4facfe; margin-bottom: 5px; }

        /* Calculator Styles */
        .calc-body { width: 100%; height: 100%; display: flex; flex-direction: column; background: #1c1c1e; }
        .calc-display { padding: 20px; text-align: right; color: white; font-size: 32px; background: #1c1c1e; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); flex: 1; }
        .btn { border: 0.1px solid #333; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        .btn:hover { background: #3a3a3c; }
        .btn-op { background: #ff9f0a; }

        /* Dock */
        #dock-container {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            padding: 8px; background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px); border-radius: 22px; border: 0.5px solid rgba(255,255,255,0.2);
        }
        #dock { display: flex; gap: 12px; }
        .dk {
            width: 52px; height: 52px; border-radius: 14px; cursor: pointer;
            transition: 0.2s cubic-bezier(0.2, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1); color: white;
        }
        .dk:hover { transform: scale(1.3) translateY(-10px); background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="os">
    <div id="wallpaper"></div>

    <div id="menubar">
        <i data-lucide="apple" class="mb-apple"></i>
        <span class="mb-appname" id="active-app">Finder</span>
        <span class="mb-item">File</span><span class="mb-item">Edit</span><span class="mb-item">View</span><span class="mb-item">Window</span>
        <div id="mb-right">
            <i data-lucide="wifi" style="width:14px"></i>
            <i data-lucide="battery" style="width:14px"></i>
            <span id="clock">--:--</span>
        </div>
    </div>

    <div id="dock-container">
        <div id="dock">
            <div class="dk" onclick="openApp('finder')"><i data-lucide="search"></i></div>
            <div class="dk" onclick="openApp('safari')"><i data-lucide="compass"></i></div>
            <div class="dk" onclick="openApp('calc')"><i data-lucide="calculator"></i></div>
            <div class="dk" onclick="openApp('settings')"><i data-lucide="settings"></i></div>
            <div class="dk" onclick="openApp('trash')"><i data-lucide="trash-2"></i></div>
        </div>
    </div>
</div>

<script>
    const os = document.getElementById('os');
    let zIndex = 1000;
    const wins = {};

    const apps = {
        finder: { title: 'Finder', w: 650, h: 420, html: `
            <div class="finder-sidebar">
                <div class="side-title">Favorites</div>
                <div class="side-item active"><i data-lucide="home" style="width:14px"></i> Home</div>
                <div class="side-item"><i data-lucide="file" style="width:14px"></i> Documents</div>
                <div class="side-item"><i data-lucide="download" style="width:14px"></i> Downloads</div>
                <div class="side-title" style="margin-top:20px;">Locations</div>
                <div class="side-item"><i data-lucide="hard-drive" style="width:14px"></i> Macintosh HD</div>
            </div>
            <div class="finder-main">
                <div class="f-item"><i data-lucide="folder" class="f-icon"></i><br>Projects</div>
                <div class="f-item"><i data-lucide="folder" class="f-icon"></i><br>Archive</div>
                <div class="f-item"><i data-lucide="image" class="f-icon"></i><br>Wallpapers</div>
            </div>` },
        safari: { title: 'Safari', w: 850, h: 550, html: `<iframe src="https://www.wikipedia.org" style="width:100%; height:100%; border:none; background:white;"></iframe>` },
        calc: { title: 'Calculator', w: 260, h: 380, html: `
            <div class="calc-body">
                <div class="calc-display" id="calc-screen">0</div>
                <div class="calc-grid">
                    <div class="btn" onclick="clearCalc()">AC</div><div class="btn" onclick="press('/')">÷</div><div class="btn" onclick="press('*')">×</div><div class="btn btn-op" onclick="press('-')">−</div>
                    <div class="btn" onclick="press('7')">7</div><div class="btn" onclick="press('8')">8</div><div class="btn" onclick="press('9')">9</div><div class="btn btn-op" onclick="press('+')">+</div>
                    <div class="btn" onclick="press('4')">4</div><div class="btn" onclick="press('5')">5</div><div class="btn" onclick="press('6')">6</div><div class="btn btn-op" onclick="solve()" style="grid-row: span 2">=</div>
                    <div class="btn" onclick="press('1')">1</div><div class="btn" onclick="press('2')">2</div><div class="btn" onclick="press('3')">3</div>
                    <div class="btn" onclick="press('0')" style="grid-column: span 2">0</div><div class="btn" onclick="press('.')">.</div>
                </div>
            </div>` },
        settings: { title: 'Settings', w: 350, h: 250, html: `<div style="color:white; padding:30px;"><h3>NextOS v3.0</h3><p>Icons: Lucide SDK</p></div>` }
    };

    function openApp(id) {
        if (wins[id]) { focusWin(id); return; }
        const config = apps[id] || {title: id, w:400, h:300, html:''};
        const w = document.createElement('div');
        w.className = 'win'; w.id = 'win-' + id;
        w.style.width = config.w + 'px'; w.style.height = config.h + 'px';
        w.style.left = '150px'; w.style.top = '100px'; w.style.zIndex = ++zIndex;
        w.innerHTML = `<div class="win-bar" onmousedown="dragStart(event,'${id}')"><div class="tb-btn tb-close" onclick="closeWin('${id}')"></div><div class="tb-btn tb-min"></div><div class="tb-btn tb-max"></div><span class="tb-title">${config.title}</span></div><div class="win-content">${config.html}</div>`;
        os.appendChild(w); wins[id] = w;
        document.getElementById('active-app').innerText = config.title;
        lucide.createIcons();
    }

    function closeWin(id) { os.removeChild(wins[id]); delete wins[id]; }
    function focusWin(id) { wins[id].style.zIndex = ++zIndex; document.getElementById('active-app').innerText = apps[id].title; }

    let drag = null;
    function dragStart(e, id) { focusWin(id); const rect = wins[id].getBoundingClientRect(); drag = { id, x: e.clientX - rect.left, y: e.clientY - rect.top }; }
    document.addEventListener('mousemove', e => { if (!drag) return; wins[drag.id].style.left = (e.clientX - drag.x) + 'px'; wins[drag.id].style.top = (e.clientY - drag.y) + 'px'; });
    document.addEventListener('mouseup', () => drag = null);

    let val = "";
    window.press = (v) => { val += v; document.getElementById('calc-screen').innerText = val; };
    window.clearCalc = () => { val = ""; document.getElementById('calc-screen').innerText = "0"; };
    window.solve = () => { try { val = eval(val).toString(); document.getElementById('calc-screen').innerText = val; } catch { val = ""; document.getElementById('calc-screen').innerText = "Error"; } };

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }, 1000);
    window.onload = () => { lucide.createIcons(); openApp('finder'); };
</script>
</body>
</html>
