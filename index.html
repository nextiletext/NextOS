<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextOS - Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        
        body, html { 
            width: 100%; height: 100%; overflow: hidden; background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        #os {
            width: 100vw; height: 100vh; position: relative; overflow: hidden;
            background: #1a2744;
        }

        #wallpaper {
            position: absolute; inset: 0;
            background: 
                radial-gradient(ellipse 60% 50% at 20% 80%, #0e3460 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 80% 20%, #1e1060 0%, transparent 55%),
                linear-gradient(135deg, #0d1f3c 0%, #1a1035 40%, #0f2545 70%, #071520 100%);
            background-size: cover;
        }

        /* Menubar */
        #menubar {
            position: absolute; top: 0; left: 0; right: 0; height: 28px;
            background: rgba(12, 14, 20, 0.7); backdrop-filter: blur(25px) saturate(180%);
            display: flex; align-items: center; padding: 0 15px; z-index: 10000;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1); color: white;
        }
        .mb-apple { width: 16px; height: 16px; margin-right: 15px; cursor: pointer; }
        .mb-appname { font-size: 13px; font-weight: 700; margin-right: 15px; }
        .mb-item { font-size: 13px; padding: 2px 8px; cursor: pointer; }
        #mb-right { margin-left: auto; font-size: 12px; font-weight: 500; }

        /* Window System */
        .win {
            position: absolute; border-radius: 12px; overflow: hidden;
            background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        }
        .win-bar {
            height: 38px; display: flex; align-items: center; padding: 0 15px; 
            gap: 8px; cursor: move; background: rgba(255, 255, 255, 0.05);
        }
        .tb-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .tb-close { background: #ff5f57; }
        .tb-min { background: #febc2e; }
        .tb-max { background: #28c840; }
        .tb-title { position: absolute; left: 50%; transform: translateX(-50%); font-size: 13px; color: rgba(255,255,255,0.7); }
        .win-content { flex: 1; overflow: hidden; position: relative; }

        /* Dock */
        #dock-container {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            padding: 5px; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px); border-radius: 20px;
            border: 0.5px solid rgba(255, 255, 255, 0.3); z-index: 9999;
        }
        #dock { display: flex; gap: 10px; align-items: flex-end; }
        .dk {
            width: 50px; height: 50px; border-radius: 12px; cursor: pointer;
            transition: transform 0.2s; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .dk:hover { transform: scale(1.2) translateY(-10px); }
        .dk img, .dk svg { width: 40px; height: 40px; }
        .dk.active::after {
            content: ''; position: absolute; bottom: -6px; width: 4px; height: 4px;
            background: white; border-radius: 50%;
        }

        /* Safari Style */
        .safari-ui { display: flex; flex-direction: column; height: 100%; background: white; }
        .safari-bar { background: #f1f1f1; padding: 8px; display: flex; gap: 10px; border-bottom: 1px solid #ddd; }
        .safari-url { flex: 1; border-radius: 5px; border: 1px solid #ccc; padding: 4px 10px; font-size: 12px; outline: none; }

        /* Calculator Style */
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); height: 100%; background: #1c1c1e; }
        .calc-btn { 
            border: 0.5px solid #333; color: white; display: flex; align-items: center; 
            justify-content: center; font-size: 18px; cursor: pointer; 
        }
        .calc-btn:hover { background: #3a3a3c; }
        .calc-op { background: #ff9f0a; }
        .calc-res { grid-column: span 4; background: #1c1c1e; padding: 20px; text-align: right; font-size: 32px; }

        /* App Contents */
        .finder-main { color: white; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, 80px); gap: 20px; }
        .f-item { text-align: center; cursor: pointer; font-size: 12px; }
        .f-icon { font-size: 30px; margin-bottom: 5px; }

        .about-ui { color: white; text-align: center; padding: 30px; }
    </style>
</head>
<body>

<div id="os">
    <div id="wallpaper"></div>

    <div id="menubar">
        <span class="mb-apple"></span>
        <span class="mb-appname" id="active-app">Finder</span>
        <span class="mb-item">File</span>
        <span class="mb-item">Edit</span>
        <span class="mb-item">View</span>
        <div id="mb-right">
            <span id="clock">12:00 PM</span>
        </div>
    </div>

    <div id="dock-container">
        <div id="dock">
            <div class="dk" onclick="openApp('finder')" title="Finder">📂</div>
            <div class="dk" onclick="openApp('safari')" title="Safari">🌐</div>
            <div class="dk" onclick="openApp('calc')" title="Calculator">🔢</div>
            <div class="dk" onclick="openApp('about')" title="About">ℹ️</div>
        </div>
    </div>
</div>

<script>
    const os = document.getElementById('os');
    let zIndex = 1000;
    const wins = {};

    const apps = {
        finder: { title: 'Finder', w: 500, h: 350, content: () => `
            <div class="finder-main">
                <div class="f-item"><div class="f-icon">📂</div>Documents</div>
                <div class="f-item"><div class="f-icon">🎬</div>Movies</div>
                <div class="f-item"><div class="f-icon">🎵</div>Music</div>
                <div class="f-item"><div class="f-icon">🖼️</div>Photos</div>
            </div>`
        },
        safari: { title: 'Safari', w: 800, h: 500, content: () => `
            <div class="safari-ui">
                <div class="safari-bar">
                    <input class="safari-url" id="safari-input" value="https://www.bing.com" onkeydown="if(event.key==='Enter') document.getElementById('s-frame').src=this.value">
                </div>
                <iframe id="s-frame" src="https://www.bing.com" style="flex:1; border:none;"></iframe>
            </div>`
        },
        calc: { title: 'Calculator', w: 250, h: 350, content: () => `
            <div class="calc-grid">
                <div class="calc-res" id="calc-display">0</div>
                <div class="calc-btn" onclick="clearCalc()">C</div>
                <div class="calc-btn" onclick="pressCalc('/')">/</div>
                <div class="calc-btn" onclick="pressCalc('*')">×</div>
                <div class="calc-btn calc-op" onclick="pressCalc('-')">-</div>
                <div class="calc-btn" onclick="pressCalc('7')">7</div>
                <div class="calc-btn" onclick="pressCalc('8')">8</div>
                <div class="calc-btn" onclick="pressCalc('9')">9</div>
                <div class="calc-btn calc-op" onclick="pressCalc('+')">+</div>
                <div class="calc-btn" onclick="pressCalc('4')">4</div>
                <div class="calc-btn" onclick="pressCalc('5')">5</div>
                <div class="calc-btn" onclick="pressCalc('6')">6</div>
                <div class="calc-btn calc-op" onclick="solveCalc()">=</div>
                <div class="calc-btn" onclick="pressCalc('1')">1</div>
                <div class="calc-btn" onclick="pressCalc('2')">2</div>
                <div class="calc-btn" onclick="pressCalc('3')">3</div>
                <div class="calc-btn" onclick="pressCalc('0')" style="grid-column: span 2">0</div>
                <div class="calc-btn" onclick="pressCalc('.')">.</div>
            </div>`
        },
        about: { title: 'About This Mac', w: 300, h: 250, content: () => `
            <div class="about-ui">
                <h1 style="margin-bottom:10px;">NextOS</h1>
                <p style="opacity:0.7">Version 1.0.4 "Dagenham"</p>
                <div style="margin-top:20px; font-size:13px; text-align:left;">
                    <p>Processor: 2.4 GHz Cloud-V</p>
                    <p>Memory: 16 GB Virtual RAM</p>
                    <p>Graphics: WebGL 2.0</p>
                </div>
            </div>`
        }
    };

    function openApp(id) {
        if (wins[id]) { focusWin(id); return; }
        const config = apps[id];
        const w = document.createElement('div');
        w.className = 'win';
        w.id = 'win-' + id;
        w.style.width = config.w + 'px';
        w.style.height = config.h + 'px';
        w.style.left = (window.innerWidth/2 - config.w/2 + (Object.keys(wins).length * 20)) + 'px';
        w.style.top = (window.innerHeight/2 - config.h/2 + (Object.keys(wins).length * 20)) + 'px';
        w.style.zIndex = ++zIndex;

        w.innerHTML = `
            <div class="win-bar" onmousedown="dragStart(event, '${id}')">
                <div class="tb-btn tb-close" onclick="closeWin('${id}')"></div>
                <div class="tb-btn tb-min"></div>
                <div class="tb-btn tb-max"></div>
                <span class="tb-title">${config.title}</span>
            </div>
            <div class="win-content">${config.content()}</div>
        `;
        os.appendChild(w);
        wins[id] = w;
        document.getElementById('active-app').innerText = config.title;
    }

    function closeWin(id) {
        os.removeChild(wins[id]);
        delete wins[id];
    }

    function focusWin(id) {
        wins[id].style.zIndex = ++zIndex;
        document.getElementById('active-app').innerText = apps[id].title;
    }

    let dragging = null;
    function dragStart(e, id) {
        focusWin(id);
        const rect = wins[id].getBoundingClientRect();
        dragging = { id, x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    document.addEventListener('mousemove', e => {
        if (!dragging) return;
        wins[dragging.id].style.left = (e.clientX - dragging.x) + 'px';
        wins[dragging.id].style.top = (e.clientY - dragging.y) + 'px';
    });

    document.addEventListener('mouseup', () => dragging = null);

    // Calculator Logic
    let calcVal = "";
    window.pressCalc = (v) => { calcVal += v; document.getElementById('calc-display').innerText = calcVal; };
    window.clearCalc = () => { calcVal = ""; document.getElementById('calc-display').innerText = "0"; };
    window.solveCalc = () => { try { calcVal = eval(calcVal).toString(); document.getElementById('calc-display').innerText = calcVal; } catch { document.getElementById('calc-display').innerText = "Error"; calcVal = ""; } };

    // Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);

    window.onload = () => openApp('finder');
</script>

</body>
</html>
